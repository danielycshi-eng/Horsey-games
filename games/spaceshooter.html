<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Shooter - Horsey Games</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body { overflow: hidden; touch-action: none; }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      z-index: 10;
      pointer-events: none;
    }

    #ui > * { pointer-events: auto; }

    .hp-bar-outer {
      width: 180px; height: 18px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 9px;
      overflow: hidden;
    }

    .hp-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      transition: width 0.2s, background 0.3s;
      border-radius: 7px;
    }

    #hp-text, #xp-text, #effects-text {
      font-size: 0.85rem;
      color: #a0c4ff;
    }

    #effects-text { color: #4ade80; }
    #effects-text.warn { color: #facc15; }
    #effects-text.immobile { color: #e94560; font-weight: bold; }
    #effects-text.poison { color: #a855f7; }

    #damage-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 15;
      border: 0px solid transparent;
      box-shadow: inset 0 0 0 0 rgba(233, 69, 96, 0);
      transition: box-shadow 0.05s;
    }

    #damage-flash.flash {
      box-shadow: inset 0 0 80px 20px rgba(233, 69, 96, 0.5);
    }

    #damage-flash.flash-gray {
      box-shadow: inset 0 0 80px 20px rgba(156, 163, 175, 0.5);
    }

    .arrow-btn {
      position: fixed;
      bottom: 30px;
      z-index: 20;
      width: 70px; height: 70px;
      background: rgba(78, 127, 255, 0.15);
      border: 2px solid rgba(78, 127, 255, 0.3);
      border-radius: 50%;
      color: #a0c4ff;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s;
    }

    .arrow-btn:active { background: rgba(78, 127, 255, 0.35); }
    #btn-left { left: 20px; }
    #btn-right { right: 20px; }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    #overlay.show { display: flex; }
    #overlay h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    #overlay p { color: #a0c4ff; margin-bottom: 1.5rem; }

    /* --- Difficulty select screen --- */
    #menu {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    #menu.hidden { display: none; }

    #menu h1 {
      font-size: 2.5rem;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #a0c4ff, #4e7fff, #a0c4ff);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    #menu .subtitle { color: #6b8ecf; font-size: 1rem; margin-bottom: 2rem; }

    .diff-options {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .diff-btn {
      padding: 0.8rem 1.5rem;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      color: #a0c4ff;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .diff-btn:hover { background: #0f3460; transform: translateY(-2px); }

    .diff-btn.selected {
      border-color: #4e7fff;
      background: #0f3460;
      box-shadow: 0 0 20px rgba(78, 127, 255, 0.3);
    }

    .diff-btn .diff-label { font-weight: 600; margin-bottom: 4px; }
    .diff-btn .diff-desc { font-size: 0.75rem; color: #6b8ecf; }

    #start-btn {
      padding: 0.8rem 3rem;
      font-size: 1.2rem;
      background: #16213e;
      color: #555;
      border: 2px solid #0f3460;
      border-radius: 10px;
      cursor: default;
      transition: all 0.3s;
    }

    #start-btn.active {
      background: linear-gradient(135deg, #e94560, #c73652);
      color: #fff;
      border-color: transparent;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(233, 69, 96, 0.4);
    }

    #start-btn.active:hover {
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.6);
      transform: scale(1.05);
    }

    #menu .back-link-menu {
      position: absolute;
      top: 1.2rem;
      left: 1.5rem;
      font-size: 1rem;
      color: #a0c4ff;
      text-decoration: none;
      transition: color 0.15s;
    }

    #menu .back-link-menu:hover { color: #fff; }
  </style>
</head>
<body>
  <div id="menu">
    <a href="../games.html" class="back-link-menu">&larr; All Games</a>
    <h1>Space Shooter</h1>
    <p class="subtitle">Choose your difficulty</p>
    <div class="diff-options">
      <button class="diff-btn" data-diff="normal">
        <div class="diff-label">Normal</div>
        <div class="diff-desc">10% fire rate</div>
      </button>
      <button class="diff-btn" data-diff="hard">
        <div class="diff-label">Hard</div>
        <div class="diff-desc">20% fire rate</div>
      </button>
      <button class="diff-btn" data-diff="impossible">
        <div class="diff-label">Impossible</div>
        <div class="diff-desc">35% fire rate, 2x damage</div>
      </button>
    </div>
    <button id="start-btn">Start Game</button>
  </div>

  <div id="ui">
    <div>
      <div id="hp-text">HP: 100</div>
      <div class="hp-bar-outer"><div class="hp-bar-inner" id="hp-bar" style="width:100%"></div></div>
      <a href="../games.html" class="back-link" style="position:static; font-size:0.8rem; margin-top:4px; display:inline-block;">&larr; All Games</a>
    </div>
    <div style="text-align:right">
      <div id="xp-text">XP: 0</div>
      <div id="effects-text"></div>
    </div>
  </div>
  <div id="damage-flash"></div>

  <canvas id="game"></canvas>

  <div class="arrow-btn" id="btn-left">&#9664;</div>
  <div class="arrow-btn" id="btn-right">&#9654;</div>

  <div id="overlay">
    <h2 id="overlay-title">Game Over</h2>
    <p id="overlay-msg"></p>
    <button class="btn" id="overlay-btn">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // --- Sizing ---
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Constants ---
    const PLAYER_W = 44, PLAYER_H = 36;
    const ALIEN_W = 36, ALIEN_H = 28;
    const BULLET_W = 4, PLAYER_BULLET_H = 14, ALIEN_BULLET_H = 10;
    const PLAYER_SPEED = 5;
    const PLAYER_BULLET_SPEED = 8;
    const ALIEN_BULLET_SPEED = 3;
    const ALIEN_COLS = 10, ALIEN_ROWS = 3;
    const ALIEN_PAD_X = 14, ALIEN_PAD_Y = 12;
    const SHOOT_COOLDOWN = 250; // ms

    // --- State ---
    let player, aliens, playerBullets, alienBullets, stars;
    let keys = {};
    let score, totalAliens, hp, gameOver, gameWon, wave, alienRows;
    let lastShot, shooting, touchShooting;
    let alienDir, alienStepDown, alienSpeed;
    let btnLeftDown = false, btnRightDown = false;
    let difficulty = null;
    let slowStacks, immobilized, immobileEndTime, slowDecayAt;
    let poisoned, poisonKillsLeft, poisonNextDmgAt;
    let diffSettings = {
      normal:     { shootChance: 0.10, bulletDmg: 1, dropSpeed: 1, moveSpeed: 1, greenChance: 0.05, slowPer: 20, slowDecay: 10, immobileTime: 10, greenDmg: 0, redChance: 0.10, redHp: 2, poisonInterval: 8, poisonCure: 5 },
      hard:       { shootChance: 0.20, bulletDmg: 1, dropSpeed: 2, moveSpeed: 1.5, greenChance: 0.08, slowPer: 30, slowDecay: 10, immobileTime: 10, greenDmg: 0, redChance: 0.25, redHp: 3, poisonInterval: 5, poisonCure: 5 },
      impossible: { shootChance: 0.35, bulletDmg: 2, dropSpeed: 2.5, moveSpeed: 2, greenChance: 0.10, slowPer: 30, slowDecay: 10, immobileTime: 15, greenDmg: 1, redChance: 0.40, redHp: 5, poisonInterval: 2, poisonCure: 10 },
    };

    // --- Menu ---
    const menuEl = document.getElementById('menu');
    const startBtn = document.getElementById('start-btn');
    const diffBtns = document.querySelectorAll('.diff-btn');

    diffBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        diffBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        difficulty = btn.dataset.diff;
        startBtn.classList.add('active');
      });
    });

    startBtn.addEventListener('click', () => {
      if (!difficulty) return;
      menuEl.classList.add('hidden');
      init();
      loop();
    });

    function initStars() {
      stars = [];
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: 0.5 + Math.random() * 1.5,
          a: 0.3 + Math.random() * 0.7,
          speed: 0.1 + Math.random() * 0.3,
        });
      }
    }

    function spawnAliens(rows) {
      aliens = [];
      const gridW = ALIEN_COLS * (ALIEN_W + ALIEN_PAD_X) - ALIEN_PAD_X;
      const startX = (canvas.width - gridW) / 2;
      const startY = 60;
      const ds = diffSettings[difficulty];
      const gc = wave >= 2 ? ds.greenChance : 0;
      const rc = wave >= 2 ? ds.redChance : 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < ALIEN_COLS; c++) {
          let type = 'blue';
          if (Math.random() < gc) {
            type = Math.random() < rc ? 'red' : 'green';
          }
          aliens.push({
            x: startX + c * (ALIEN_W + ALIEN_PAD_X) + ALIEN_W / 2,
            y: startY + r * (ALIEN_H + ALIEN_PAD_Y) + ALIEN_H / 2,
            alive: true,
            type: type,
            hp: type === 'red' ? ds.redHp : 1,
          });
        }
      }
      totalAliens += aliens.length;
    }

    function init() {
      player = { x: canvas.width / 2, y: canvas.height - 70 };
      playerBullets = [];
      alienBullets = [];
      score = 0;
      hp = 100;
      gameOver = false;
      gameWon = false;
      lastShot = 0;
      shooting = false;
      touchShooting = false;
      alienDir = 1;
      alienStepDown = 0;
      alienSpeed = diffSettings[difficulty].moveSpeed;
      wave = 1;
      alienRows = ALIEN_ROWS;
      totalAliens = 0;

      slowStacks = 0;
      immobilized = false;
      immobileEndTime = 0;
      slowDecayAt = 0;
      poisoned = false;
      poisonKillsLeft = 0;
      poisonNextDmgAt = 0;

      spawnAliens(alienRows);
      initStars();
      updateUI();
      hideOverlay();
    }

    function nextWave() {
      wave++;
      alienRows++;
      playerBullets = [];
      alienBullets = [];
      gameWon = false;
      alienDir = 1;
      alienStepDown = 0;
      spawnAliens(alienRows);
      updateUI();
      hideOverlay();
    }

    // --- Drawing ---

    function drawStars() {
      for (const s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
      }
    }

    function drawPlayerShip(x, y) {
      // Body
      ctx.fillStyle = '#8a8f9e';
      ctx.beginPath();
      ctx.roundRect(x - PLAYER_W / 2, y - PLAYER_H / 2, PLAYER_W, PLAYER_H, 6);
      ctx.fill();
      // Highlight edge
      ctx.fillStyle = '#b0b5c3';
      ctx.beginPath();
      ctx.roundRect(x - PLAYER_W / 2 + 3, y - PLAYER_H / 2 + 2, PLAYER_W - 6, 4, 2);
      ctx.fill();
      // Window (slot pointing up)
      ctx.fillStyle = '#d0d4de';
      ctx.beginPath();
      ctx.roundRect(x - 8, y - PLAYER_H / 2 + 4, 16, 12, 3);
      ctx.fill();
      // Shooter barrel
      ctx.fillStyle = '#6b7080';
      ctx.fillRect(x - 3, y - PLAYER_H / 2 - 10, 6, 12);
      // Shooter tip
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(x, y - PLAYER_H / 2 - 10, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    const ALIEN_COLORS = {
      blue:  { body: '#4e7fff', window: '#a0c4ff' },
      green: { body: '#22c55e', window: '#4ade80' },
      red:   { body: '#dc2626', window: '#f87171' },
    };

    function drawAlienShip(x, y, type, alienHp, maxHp) {
      const c = ALIEN_COLORS[type] || ALIEN_COLORS.blue;
      // Body
      ctx.fillStyle = c.body;
      ctx.beginPath();
      ctx.roundRect(x - ALIEN_W / 2, y - ALIEN_H / 2, ALIEN_W, ALIEN_H, 5);
      ctx.fill();
      // Window (slot pointing down)
      ctx.fillStyle = c.window;
      ctx.beginPath();
      ctx.roundRect(x - 7, y + ALIEN_H / 2 - 14, 14, 10, 3);
      ctx.fill();
      // HP indicator for multi-hp aliens
      if (maxHp > 1) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(alienHp, x, y - ALIEN_H / 2 - 4);
      }
    }

    function drawBullets() {
      // Player bullets
      ctx.fillStyle = '#a0c4ff';
      for (const b of playerBullets) {
        ctx.beginPath();
        ctx.roundRect(b.x - BULLET_W / 2, b.y - PLAYER_BULLET_H / 2, BULLET_W, PLAYER_BULLET_H, 2);
        ctx.fill();
        // Glow
        ctx.shadowColor = '#4e7fff';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Alien bullets
      const BULLET_COLORS = { blue: '#e94560', green: '#9ca3af', red: '#facc15' };
      for (const b of alienBullets) {
        const bc = BULLET_COLORS[b.type] || BULLET_COLORS.blue;
        ctx.fillStyle = bc;
        ctx.beginPath();
        ctx.roundRect(b.x - BULLET_W / 2, b.y - ALIEN_BULLET_H / 2, BULLET_W, ALIEN_BULLET_H, 2);
        ctx.fill();
        ctx.shadowColor = bc;
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    // --- UI ---

    function getHpColor(hp) {
      if (hp > 30) return 'linear-gradient(90deg, #22c55e, #4ade80)';
      if (hp > 15) return 'linear-gradient(90deg, #eab308, #facc15)';
      if (hp > 5)  return 'linear-gradient(90deg, #f97316, #fb923c)';
      return 'linear-gradient(90deg, #dc2626, #ef4444)';
    }

    function flashDamage() {
      const el = document.getElementById('damage-flash');
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 150);
    }

    function flashSlow() {
      const el = document.getElementById('damage-flash');
      el.classList.add('flash-gray');
      setTimeout(() => el.classList.remove('flash-gray'), 150);
    }

    const ROMAN = ['', 'I', 'II', 'III', 'IV', 'V'];

    function applySlow() {
      const ds = diffSettings[difficulty];
      slowStacks++;
      const totalSlow = slowStacks * ds.slowPer;
      if (totalSlow >= 100) {
        immobilized = true;
        immobileEndTime = performance.now() + ds.immobileTime * 1000;
        slowStacks = 0;
        slowDecayAt = 0;
      } else {
        // Reset timer to 10s on every hit
        slowDecayAt = performance.now() + ds.slowDecay * 1000;
      }
      updateEffectsUI();
    }

    function updateSlowness(now) {
      if (immobilized) {
        if (now >= immobileEndTime) {
          immobilized = false;
          immobileEndTime = 0;
        }
        updateEffectsUI();
        return;
      }
      // Decay: when timer expires, remove one stack and reset timer
      if (slowStacks > 0 && slowDecayAt > 0 && now >= slowDecayAt) {
        slowStacks--;
        if (slowStacks > 0) {
          slowDecayAt = now + diffSettings[difficulty].slowDecay * 1000;
        } else {
          slowDecayAt = 0;
        }
      }
      if (slowStacks > 0 || immobilized || poisoned) updateEffectsUI();
      else if (!poisoned) { document.getElementById('effects-text').textContent = ''; }
    }

    function updateEffectsUI() {
      const el = document.getElementById('effects-text');
      let lines = [];

      if (immobilized) {
        const secs = Math.max(0, Math.ceil((immobileEndTime - performance.now()) / 1000));
        lines.push(`Immobilized (${secs}s)`);
      } else if (slowStacks > 0) {
        const secs = slowDecayAt > 0 ? Math.max(0, Math.ceil((slowDecayAt - performance.now()) / 1000)) : 0;
        lines.push(`Slowness ${ROMAN[slowStacks] || slowStacks} (${secs}s)`);
      }

      if (poisoned) {
        lines.push(`Poison (${poisonKillsLeft} kills left)`);
      }

      el.innerHTML = lines.join('<br>');
      // Color priority: immobile > poison > slow warn
      if (immobilized) el.className = 'immobile';
      else if (poisoned) el.className = 'poison';
      else if (slowStacks >= 3) el.className = 'warn';
      else el.className = '';
    }

    function applyPoison() {
      const ds = diffSettings[difficulty];
      poisoned = true;
      poisonKillsLeft = ds.poisonCure;
      poisonNextDmgAt = performance.now() + ds.poisonInterval * 1000;
    }

    function updatePoison(now) {
      if (!poisoned) return;
      if (now >= poisonNextDmgAt) {
        hp = Math.max(0, hp - 1);
        updateEffectsUI();
        flashDamage();
        if (hp <= 0) {
          gameOver = true;
          showOverlay('Game Over', `Poison got you! Score: ${score % 1 === 0 ? score : score.toFixed(1)} XP`, 'Play Again', 'menu');
          return;
        }
        poisonNextDmgAt = now + diffSettings[difficulty].poisonInterval * 1000;
      }
    }

    function updateUI() {
      document.getElementById('hp-text').textContent = `HP: ${hp}`;
      document.getElementById('hp-bar').style.width = `${hp}%`;
      document.getElementById('hp-bar').style.background = getHpColor(hp);
      document.getElementById('xp-text').textContent = `XP: ${score % 1 === 0 ? score : score.toFixed(1)}`;
    }

    let overlayMode = 'menu';

    function showOverlay(title, msg, btnText, mode) {
      document.getElementById('overlay-title').textContent = title;
      document.getElementById('overlay-msg').textContent = msg;
      document.getElementById('overlay-btn').textContent = btnText || 'Play Again';
      overlayMode = mode || 'menu';
      document.getElementById('overlay').classList.add('show');
    }

    function hideOverlay() {
      document.getElementById('overlay').classList.remove('show');
    }

    // --- Update ---

    function update() {
      if (gameOver || gameWon) return;

      // Player movement
      let dx = 0;
      if (!immobilized) {
        if (keys['ArrowLeft'] || keys['KeyA'] || btnLeftDown) dx -= PLAYER_SPEED;
        if (keys['ArrowRight'] || keys['KeyD'] || btnRightDown) dx += PLAYER_SPEED;
        const slowPct = Math.min(slowStacks * diffSettings[difficulty].slowPer, 100);
        dx *= (1 - slowPct / 100);
      }
      player.x = Math.max(PLAYER_W / 2, Math.min(canvas.width - PLAYER_W / 2, player.x + dx));

      // Shooting
      const now = performance.now();
      if (!immobilized && (keys['Space'] || shooting || touchShooting) && now - lastShot > SHOOT_COOLDOWN) {
        playerBullets.push({ x: player.x, y: player.y - PLAYER_H / 2 - 14 });
        lastShot = now;
      }

      // Move player bullets
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        playerBullets[i].y -= PLAYER_BULLET_SPEED;
        if (playerBullets[i].y < -20) playerBullets.splice(i, 1);
      }

      // Alien group movement
      let leftMost = Infinity, rightMost = -Infinity;
      for (const a of aliens) {
        if (!a.alive) continue;
        if (a.x - ALIEN_W / 2 < leftMost) leftMost = a.x - ALIEN_W / 2;
        if (a.x + ALIEN_W / 2 > rightMost) rightMost = a.x + ALIEN_W / 2;
      }

      const edgePad = 40;
      if (rightMost + alienSpeed * alienDir > canvas.width - edgePad || leftMost + alienSpeed * alienDir < edgePad) {
        alienDir *= -1;
        alienStepDown = 20 * diffSettings[difficulty].dropSpeed;
      }

      for (const a of aliens) {
        if (!a.alive) continue;
        a.x += alienSpeed * alienDir;
        if (alienStepDown > 0) a.y += 0.5 * diffSettings[difficulty].dropSpeed;
      }
      if (alienStepDown > 0) alienStepDown--;

      // Alien shooting (5% chance per second per alien → per frame ~0.083% at 60fps)
      const shootChance = diffSettings[difficulty].shootChance / 60;
      for (const a of aliens) {
        if (!a.alive) continue;
        if (Math.random() < shootChance) {
          alienBullets.push({ x: a.x, y: a.y + ALIEN_H / 2, type: a.type });
        }
      }

      // Move alien bullets
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        alienBullets[i].y += ALIEN_BULLET_SPEED;
        if (alienBullets[i].y > canvas.height + 20) alienBullets.splice(i, 1);
      }

      // Collision: player bullets → aliens
      for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
        const b = playerBullets[bi];
        for (const a of aliens) {
          if (!a.alive) continue;
          if (Math.abs(b.x - a.x) < ALIEN_W / 2 + BULLET_W / 2 &&
              Math.abs(b.y - a.y) < ALIEN_H / 2 + PLAYER_BULLET_H / 2) {
            playerBullets.splice(bi, 1);
            a.hp--;
            if (a.hp <= 0) {
              a.alive = false;
              const xpGain = a.type === 'red' ? 3 : a.type === 'green' ? 1.5 : 1;
              score += xpGain;
              // Poison cure: count kills
              if (poisoned) {
                poisonKillsLeft--;
                if (poisonKillsLeft <= 0) {
                  poisoned = false;
                  poisonKillsLeft = 0;
                  poisonNextDmgAt = 0;
                }
              }
            }
            updateUI();
            break;
          }
        }
      }

      // Collision: alien bullets → player
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        const b = alienBullets[i];
        if (Math.abs(b.x - player.x) < PLAYER_W / 2 + BULLET_W / 2 &&
            Math.abs(b.y - player.y) < PLAYER_H / 2 + ALIEN_BULLET_H / 2) {
          alienBullets.splice(i, 1);
          if (b.type === 'green') {
            applySlow();
            flashSlow();
            const gDmg = diffSettings[difficulty].greenDmg;
            if (gDmg > 0) hp = Math.max(0, hp - gDmg);
          } else if (b.type === 'red') {
            hp = Math.max(0, hp - diffSettings[difficulty].bulletDmg);
            applyPoison();
            flashDamage();
          } else {
            hp = Math.max(0, hp - diffSettings[difficulty].bulletDmg);
            flashDamage();
          }
          updateUI();
          if (hp <= 0) {
            gameOver = true;
            showOverlay('Game Over', `You scored ${score} kills`, 'Play Again', 'menu');
            return;
          }
        }
      }

      // Slowness / immobilization tick
      updateSlowness(now);
      // Poison tick
      updatePoison(now);

      // Check if aliens reached player
      for (const a of aliens) {
        if (a.alive && a.y + ALIEN_H / 2 >= player.y - PLAYER_H / 2) {
          gameOver = true;
          showOverlay('Game Over', 'The aliens reached you!', 'Play Again', 'menu');
          return;
        }
      }

      // Win check
      if (aliens.every(a => !a.alive)) {
        gameWon = true;
        showOverlay('Wave Defeated!', `Next wave: ${alienRows + 1} rows of aliens.`, 'Start Next Wave', 'wave');
      }
    }

    // --- Game loop ---

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawStars();

      if (!gameOver && !gameWon) update();

      // Draw aliens
      for (const a of aliens) {
        if (a.alive) drawAlienShip(a.x, a.y, a.type, a.hp, a.type === 'red' ? diffSettings[difficulty].redHp : 1);
      }

      // Draw player
      drawPlayerShip(player.x, player.y);

      // Draw bullets
      drawBullets();

      requestAnimationFrame(loop);
    }

    // --- Input ---

    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space') e.preventDefault();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // On-screen buttons
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');

    btnLeft.addEventListener('mousedown', e => { e.preventDefault(); btnLeftDown = true; });
    btnLeft.addEventListener('mouseup', () => { btnLeftDown = false; });
    btnLeft.addEventListener('mouseleave', () => { btnLeftDown = false; });
    btnLeft.addEventListener('touchstart', e => { e.preventDefault(); btnLeftDown = true; });
    btnLeft.addEventListener('touchend', () => { btnLeftDown = false; });

    btnRight.addEventListener('mousedown', e => { e.preventDefault(); btnRightDown = true; });
    btnRight.addEventListener('mouseup', () => { btnRightDown = false; });
    btnRight.addEventListener('mouseleave', () => { btnRightDown = false; });
    btnRight.addEventListener('touchstart', e => { e.preventDefault(); btnRightDown = true; });
    btnRight.addEventListener('touchend', () => { btnRightDown = false; });

    // Touch/click to shoot (not on buttons or back link)
    canvas.addEventListener('mousedown', () => { touchShooting = true; });
    canvas.addEventListener('mouseup', () => { touchShooting = false; });
    canvas.addEventListener('touchstart', e => { touchShooting = true; });
    canvas.addEventListener('touchend', () => { touchShooting = false; });

    // Overlay button — next wave or back to menu
    document.getElementById('overlay-btn').addEventListener('click', () => {
      if (overlayMode === 'wave') {
        nextWave();
      } else {
        hideOverlay();
        menuEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
