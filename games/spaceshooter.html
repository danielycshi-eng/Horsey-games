<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Shooter - Horsey Games</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body { overflow: hidden; touch-action: none; }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      z-index: 10;
      pointer-events: none;
    }

    #ui > * { pointer-events: auto; }

    .hp-bar-outer {
      width: 180px; height: 18px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 9px;
      overflow: hidden;
    }

    .hp-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      transition: width 0.2s, background 0.3s;
      border-radius: 7px;
    }

    #hp-text, #xp-text, #effects-text {
      font-size: 0.85rem;
      color: #a0c4ff;
    }

    #effects-text { color: #4ade80; }
    #effects-text.warn { color: #facc15; }
    #effects-text.immobile { color: #e94560; font-weight: bold; }
    #effects-text.poison { color: #a855f7; }

    #damage-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 15;
      border: 0px solid transparent;
      box-shadow: inset 0 0 0 0 rgba(233, 69, 96, 0);
      transition: box-shadow 0.05s;
    }

    #damage-flash.flash {
      box-shadow: inset 0 0 80px 20px rgba(233, 69, 96, 0.5);
    }

    #damage-flash.flash-gray {
      box-shadow: inset 0 0 80px 20px rgba(156, 163, 175, 0.5);
    }

    #damage-flash.flash-poison {
      box-shadow: inset 0 0 80px 20px rgba(34, 197, 94, 0.5);
    }

    .arrow-btn {
      position: fixed;
      bottom: 30px;
      z-index: 20;
      width: 70px; height: 70px;
      background: rgba(78, 127, 255, 0.15);
      border: 2px solid rgba(78, 127, 255, 0.3);
      border-radius: 50%;
      color: #a0c4ff;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s;
    }

    .arrow-btn:active { background: rgba(78, 127, 255, 0.35); }
    #btn-left { left: 20px; }
    #btn-right { right: 20px; }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    #overlay.show { display: flex; }
    #overlay h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    #overlay p { color: #a0c4ff; margin-bottom: 1.5rem; white-space: pre-line; text-align: center; line-height: 1.6; }

    /* --- Difficulty select screen --- */
    #menu {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    #menu.hidden { display: none; }

    #menu h1 {
      font-size: 2.5rem;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #a0c4ff, #4e7fff, #a0c4ff);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    #menu .subtitle { color: #6b8ecf; font-size: 1rem; margin-bottom: 2rem; }

    .diff-options {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .diff-btn {
      padding: 0.8rem 1.5rem;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      color: #a0c4ff;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .diff-btn:hover { background: #0f3460; transform: translateY(-2px); }

    .diff-btn.selected {
      border-color: #4e7fff;
      background: #0f3460;
      box-shadow: 0 0 20px rgba(78, 127, 255, 0.3);
    }

    .diff-btn .diff-label, .life-btn .diff-label { font-weight: 600; margin-bottom: 4px; }
    .diff-btn .diff-desc, .life-btn .diff-desc { font-size: 0.75rem; color: #6b8ecf; }

    .life-btn {
      padding: 0.6rem 1rem;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      color: #a0c4ff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .life-btn:hover { background: #0f3460; transform: translateY(-2px); }

    .life-btn.selected {
      border-color: #4e7fff;
      background: #0f3460;
      box-shadow: 0 0 20px rgba(78, 127, 255, 0.3);
    }

    #hardcore-heart {
      position: fixed;
      top: 8px;
      left: 18px;
      font-size: 3.5rem;
      pointer-events: none;
      line-height: 1;
      color: #e94560;
      display: none;
      z-index: 12;
      transition: top 1.5s ease-in-out, left 1.5s ease-in-out, font-size 1.5s ease-in-out;
    }

    #hardcore-heart.show { display: block; }

    #hardcore-heart.center {
      top: 50%;
      left: 50%;
      font-size: 16rem;
      transform: translate(-50%, -50%);
    }

    #god-heart {
      position: fixed;
      top: 8px;
      left: 18px;
      font-size: 3.5rem;
      pointer-events: none;
      line-height: 1;
      color: #fbbf24;
      display: none;
      z-index: 12;
      text-shadow: 0 0 15px rgba(251, 191, 36, 0.6);
    }

    #god-heart.show { display: block; }

    #god-heart .infinity {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.4rem;
      color: #1a1a2e;
      text-shadow: none;
      font-weight: bold;
    }

    #god-options {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }

    #god-options.show { display: flex; }

    #fire-canvas {
      position: fixed;
      top: -20px;
      left: -22px;
      width: 140px;
      height: 100px;
      z-index: 11;
      pointer-events: none;
      display: none;
    }

    #fire-canvas.show { display: block; }

    /* Particle canvas for shatter */
    #shatter-canvas {
      position: fixed;
      inset: 0;
      z-index: 13;
      pointer-events: none;
      display: none;
    }

    .toggle-row {
      margin: 1rem 0;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #a0c4ff;
      font-size: 1rem;
      cursor: pointer;
      user-select: none;
    }

    .toggle-label input { display: none; }

    .toggle-switch {
      width: 40px; height: 22px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 11px;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      background: #555;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-label input:checked + .toggle-switch {
      background: #0f3460;
      border-color: #e94560;
    }

    .toggle-label input:checked + .toggle-switch::after {
      transform: translateX(18px);
      background: #e94560;
    }

    #start-btn {
      padding: 0.8rem 3rem;
      font-size: 1.2rem;
      background: #16213e;
      color: #555;
      border: 2px solid #0f3460;
      border-radius: 10px;
      cursor: default;
      transition: all 0.3s;
    }

    #start-btn.active {
      background: linear-gradient(135deg, #e94560, #c73652);
      color: #fff;
      border-color: transparent;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(233, 69, 96, 0.4);
    }

    #start-btn.active:hover {
      box-shadow: 0 0 40px rgba(233, 69, 96, 0.6);
      transform: scale(1.05);
    }

    #menu .back-link-menu {
      position: absolute;
      top: 1.2rem;
      left: 1.5rem;
      font-size: 1rem;
      color: #a0c4ff;
      text-decoration: none;
      transition: color 0.15s;
    }

    #menu .back-link-menu:hover { color: #fff; }
  </style>
</head>
<body>
  <div id="menu">
    <a href="../games.html" class="back-link-menu">&larr; All Games</a>
    <h1>Space Shooter</h1>

    <p class="subtitle">Choose mode</p>
    <div class="diff-options">
      <button class="diff-btn" data-diff="normal">
        <div class="diff-label">Normal</div>
        <div class="diff-desc">10% fire rate</div>
      </button>
      <button class="diff-btn" data-diff="hard">
        <div class="diff-label">Hard</div>
        <div class="diff-desc">20% fire rate</div>
      </button>
      <button class="diff-btn" data-diff="impossible">
        <div class="diff-label">Impossible</div>
        <div class="diff-desc">35% fire rate, 2x dmg</div>
      </button>
    </div>

    <p class="subtitle">Choose difficulty</p>
    <div class="diff-options" id="life-options">
      <button class="life-btn" data-lives="beginner">
        <div class="diff-label">Beginner</div>
        <div class="diff-desc">100 lives</div>
      </button>
      <button class="life-btn" data-lives="intermediate">
        <div class="diff-label">Intermediate</div>
        <div class="diff-desc">50 lives</div>
      </button>
      <button class="life-btn" data-lives="advanced">
        <div class="diff-label">Advanced</div>
        <div class="diff-desc">25 lives</div>
      </button>
      <button class="life-btn" data-lives="expert">
        <div class="diff-label">Expert</div>
        <div class="diff-desc">10 lives</div>
      </button>
      <button class="life-btn" data-lives="hardcore">
        <div class="diff-label">Hardcore</div>
        <div class="diff-desc">1 life</div>
      </button>
      <button class="life-btn" data-lives="god">
        <div class="diff-label" style="color:#fbbf24">God</div>
        <div class="diff-desc">Invincible</div>
      </button>
    </div>

    <div id="god-options">
      <label class="toggle-label">
        <input type="checkbox" id="god-immune-bad">
        <span class="toggle-switch"></span>
        Immune to bad effects
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="god-immune-all">
        <span class="toggle-switch"></span>
        Immune to all effects
      </label>
    </div>

    <div class="toggle-row">
      <label class="toggle-label">
        <input type="checkbox" id="reload-toggle">
        <span class="toggle-switch"></span>
        Reload
      </label>
    </div>

    <button id="start-btn">Start Game</button>
  </div>

  <canvas id="fire-canvas" width="140" height="100"></canvas>
  <div id="hardcore-heart">&#10084;</div>
  <div id="god-heart">&#10084;<span class="infinity">&infin;</span></div>
  <canvas id="shatter-canvas"></canvas>
  <div id="ui">
    <div>
      <div id="hp-text">HP: 100</div>
      <div class="hp-bar-outer"><div class="hp-bar-inner" id="hp-bar" style="width:100%"></div></div>
      <a href="../games.html" id="back-link-game" class="back-link" style="position:static; font-size:0.8rem; margin-top:4px; display:inline-block;">&larr; All Games</a>
    </div>
    <div style="text-align:right">
      <div id="xp-text">XP: 0</div>
      <div id="effects-text"></div>
    </div>
  </div>
  <div id="damage-flash"></div>

  <canvas id="game"></canvas>

  <div class="arrow-btn" id="btn-left">&#9664;</div>
  <div class="arrow-btn" id="btn-right">&#9654;</div>

  <div id="overlay">
    <h2 id="overlay-title">Game Over</h2>
    <p id="overlay-msg"></p>
    <button class="btn" id="overlay-btn">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // --- Sizing ---
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Constants ---
    const PLAYER_W = 44, PLAYER_H = 36;
    const ALIEN_W = 36, ALIEN_H = 28;
    const BULLET_W = 4, PLAYER_BULLET_H = 14, ALIEN_BULLET_H = 10;
    const PLAYER_SPEED = 5;
    const PLAYER_BULLET_SPEED = 8;
    const ALIEN_BULLET_SPEED = 3;
    const ALIEN_COLS = 10, ALIEN_ROWS = 3;
    const ALIEN_PAD_X = 14, ALIEN_PAD_Y = 12;
    const SHOOT_COOLDOWN = 250; // ms

    // --- State ---
    let player, aliens, playerBullets, alienBullets, stars;
    let keys = {};
    let score, totalAliens, hp, gameOver, gameWon, wave, alienRows;
    let lastShot, shooting, touchShooting;
    let alienDir, alienStepDown, alienSpeed;
    let btnLeftDown = false, btnRightDown = false;
    let difficulty = null;
    let slowStacks, immobilized, immobileEndTime, slowDecayAt;
    let poisoned, poisonKillsLeft, poisonNextDmgAt;
    let kills;
    let powerups; // falling powerup items
    let speedStacks, speedDecayAt;
    let shieldActive, shieldExpireAt;
    let multiStacks, multiDecayAt;
    let pierceStacks, pierceDecayAt;
    let bombStacks, bombDecayAt;
    let mysteryActive, mysteryExpireAt;
    let reloadEnabled = false;
    let godImmuneBad = false, godImmuneAll = false;
    let ammo, maxAmmo, reloading, reloadStartAt, reloadDuration, reloadActualDur, reloadStartAmmo;
    let boss, bossCount, bossLastShot, bossBullets;
    let lifeDifficulty = null;
    let lifeSettings = {
      beginner:     { hp: 100, yellow: 30, orange: 15, red: 5 },
      intermediate: { hp: 50,  yellow: 20, orange: 10, red: 5 },
      advanced:     { hp: 25,  yellow: 10, orange: 5,  red: 2 },
      expert:       { hp: 10,  yellow: 5,  orange: 3,  red: 1 },
      hardcore:     { hp: 1,   yellow: 0,  orange: 0,  red: 0 },
      god:          { hp: Infinity, yellow: 0, orange: 0, red: 0 },
    };
    let diffSettings = {
      normal:     { shootChance: 0.10, bulletDmg: 1, dropSpeed: 1, moveSpeed: 1, greenChance: 0.05, greenHp: 1, slowPer: 20, slowDecay: 10, immobileTime: 10, greenDmg: 0, redChance: 0.10, redHp: 2, poisonInterval: 8, poisonCure: 5, powerupChance: 0.08, shieldTime: 15, magSize: 15, reloadTime: 3, reloadWarn: 5, bossInterval: 8 },
      hard:       { shootChance: 0.20, bulletDmg: 1, dropSpeed: 2, moveSpeed: 1.5, greenChance: 0.08, greenHp: 1, slowPer: 30, slowDecay: 10, immobileTime: 10, greenDmg: 0, redChance: 0.25, redHp: 3, poisonInterval: 5, poisonCure: 5, powerupChance: 0.08, shieldTime: 15, magSize: 15, reloadTime: 5, reloadWarn: 5, bossInterval: 5 },
      impossible: { shootChance: 0.35, bulletDmg: 2, dropSpeed: 2.5, moveSpeed: 2, greenChance: 0.10, greenHp: 2, slowPer: 30, slowDecay: 10, immobileTime: 15, greenDmg: 1, redChance: 0.40, redHp: 5, poisonInterval: 2, poisonCure: 10, powerupChance: 0.05, shieldTime: 12, magSize: 10, reloadTime: 8, reloadWarn: 3, bossInterval: 3 },
    };

    // --- Menu ---
    const menuEl = document.getElementById('menu');
    const startBtn = document.getElementById('start-btn');
    const diffBtns = document.querySelectorAll('.diff-btn');
    const lifeBtns = document.querySelectorAll('.life-btn');

    function checkReady() {
      if (difficulty && lifeDifficulty) startBtn.classList.add('active');
    }

    diffBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        diffBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        difficulty = btn.dataset.diff;
        checkReady();
      });
    });

    const godOptionsEl = document.getElementById('god-options');
    const godImmuneBadEl = document.getElementById('god-immune-bad');
    const godImmuneAllEl = document.getElementById('god-immune-all');

    lifeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        lifeBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        lifeDifficulty = btn.dataset.lives;
        if (lifeDifficulty === 'god') {
          godOptionsEl.classList.add('show');
        } else {
          godOptionsEl.classList.remove('show');
          godImmuneBadEl.checked = false;
          godImmuneAllEl.checked = false;
        }
        checkReady();
      });
    });

    // Mutual exclusion: "Immune to all" deselects "Immune to bad"
    godImmuneAllEl.addEventListener('change', () => {
      if (godImmuneAllEl.checked) godImmuneBadEl.checked = false;
    });
    godImmuneBadEl.addEventListener('change', () => {
      if (godImmuneBadEl.checked) godImmuneAllEl.checked = false;
    });

    startBtn.addEventListener('click', () => {
      if (!difficulty || !lifeDifficulty) return;
      reloadEnabled = document.getElementById('reload-toggle').checked;
      godImmuneBad = godImmuneBadEl.checked;
      godImmuneAll = godImmuneAllEl.checked;
      menuEl.classList.add('hidden');
      init();
      if (!loopRunning) { loopRunning = true; loop(); }
    });

    function initStars() {
      stars = [];
      for (let i = 0; i < 120; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: 0.5 + Math.random() * 1.5,
          a: 0.3 + Math.random() * 0.7,
          speed: 0.1 + Math.random() * 0.3,
        });
      }
    }

    function spawnAliens(rows) {
      aliens = [];
      const gridW = ALIEN_COLS * (ALIEN_W + ALIEN_PAD_X) - ALIEN_PAD_X;
      const startX = (canvas.width - gridW) / 2;
      const startY = 60;
      const ds = diffSettings[difficulty];
      const gc = wave >= 2 ? ds.greenChance : 0;
      const rc = wave >= 2 ? ds.redChance : 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < ALIEN_COLS; c++) {
          let type = 'blue';
          if (Math.random() < gc) {
            type = Math.random() < rc ? 'red' : 'green';
          }
          aliens.push({
            x: startX + c * (ALIEN_W + ALIEN_PAD_X) + ALIEN_W / 2,
            y: startY + r * (ALIEN_H + ALIEN_PAD_Y) + ALIEN_H / 2,
            alive: true,
            type: type,
            hp: type === 'red' ? ds.redHp : type === 'green' ? ds.greenHp : 1,
          });
        }
      }
      totalAliens += aliens.length;
    }

    function init() {
      player = { x: canvas.width / 2, y: canvas.height - 70 };
      playerBullets = [];
      alienBullets = [];
      score = 0;
      hp = lifeSettings[lifeDifficulty].hp;
      gameOver = false;
      gameWon = false;
      lastShot = 0;
      shooting = false;
      touchShooting = false;
      alienDir = 1;
      alienStepDown = 0;
      alienSpeed = diffSettings[difficulty].moveSpeed;
      wave = 1;
      alienRows = ALIEN_ROWS;
      totalAliens = 0;

      slowStacks = 0;
      immobilized = false;
      immobileEndTime = 0;
      slowDecayAt = 0;
      poisoned = false;
      poisonKillsLeft = 0;
      poisonNextDmgAt = 0;
      kills = { blue: 0, green: 0, red: 0, boss: 0 };
      powerups = [];
      speedStacks = 0; speedDecayAt = 0;
      shieldActive = false; shieldExpireAt = 0;
      multiStacks = 0; multiDecayAt = 0;
      pierceStacks = 0; pierceDecayAt = 0;
      bombStacks = 0; bombDecayAt = 0;
      mysteryActive = false; mysteryExpireAt = 0;
      deathParticles = [];
      boss = null;
      bossCount = 0;
      bossLastShot = 0;
      bossBullets = [];

      // Reload
      const ds = diffSettings[difficulty];
      maxAmmo = ds.magSize;
      ammo = maxAmmo;
      reloading = false;
      reloadStartAt = 0;
      reloadDuration = ds.reloadTime * 1000;
      reloadActualDur = reloadDuration;

      spawnAliens(alienRows);
      initStars();
      updateUI();
      hideOverlay();
    }

    function nextWave() {
      wave++;
      alienRows++;
      playerBullets = [];
      alienBullets = [];
      gameWon = false;
      alienDir = 1;
      alienStepDown = 0;
      ammo = maxAmmo;
      reloading = false;
      reloadStartAt = 0;
      reloadActualDur = reloadDuration;
      // Clear debuffs
      slowStacks = 0;
      immobilized = false;
      immobileEndTime = 0;
      slowDecayAt = 0;
      poisoned = false;
      poisonKillsLeft = 0;
      poisonNextDmgAt = 0;
      powerups = [];
      speedStacks = 0; speedDecayAt = 0;
      shieldActive = false; shieldExpireAt = 0;
      multiStacks = 0; multiDecayAt = 0;
      pierceStacks = 0; pierceDecayAt = 0;
      bombStacks = 0; bombDecayAt = 0;
      mysteryActive = false; mysteryExpireAt = 0;
      document.getElementById('effects-text').textContent = '';
      boss = null;
      bossBullets = [];
      bossLastShot = 0;
      // Boss: 50% chance on odd waves >= 3
      if (wave >= 3 && wave % 2 === 1 && Math.random() < 0.5) {
        bossCount++;
        const bossHp = 100 + (bossCount - 1) * 50;
        boss = {
          x: canvas.width / 2,
          y: 120,
          hp: bossHp,
          maxHp: bossHp,
          dir: 1,
          alive: true,
        };
        bossLastShot = performance.now();
      }
      if (!boss) spawnAliens(alienRows);
      else aliens = [];
      updateUI();
      hideOverlay();
    }

    // --- Drawing ---

    function drawStars() {
      for (const s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
        s.y += s.speed;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
      }
    }

    function drawPlayerShip(x, y) {
      // Body
      ctx.fillStyle = '#8a8f9e';
      ctx.beginPath();
      ctx.roundRect(x - PLAYER_W / 2, y - PLAYER_H / 2, PLAYER_W, PLAYER_H, 6);
      ctx.fill();
      // Highlight edge
      ctx.fillStyle = '#b0b5c3';
      ctx.beginPath();
      ctx.roundRect(x - PLAYER_W / 2 + 3, y - PLAYER_H / 2 + 2, PLAYER_W - 6, 4, 2);
      ctx.fill();
      // Window (slot pointing up)
      ctx.fillStyle = '#d0d4de';
      ctx.beginPath();
      ctx.roundRect(x - 8, y - PLAYER_H / 2 + 4, 16, 12, 3);
      ctx.fill();
      // Shooter barrel
      ctx.fillStyle = '#6b7080';
      ctx.fillRect(x - 3, y - PLAYER_H / 2 - 10, 6, 12);
      // Shooter tip
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(x, y - PLAYER_H / 2 - 10, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function startReload(now) {
      reloading = true;
      reloadStartAt = now;
      reloadStartAmmo = ammo;
      // Proportional: reload time based on how much ammo is missing
      reloadActualDur = reloadDuration * ((maxAmmo - ammo) / maxAmmo);
    }

    function drawReloadBar(x, y) {
      if (!reloadEnabled) return;
      const ds = diffSettings[difficulty];
      const barW = 6, barH = PLAYER_H + 10;
      const bx = x + PLAYER_W / 2 + 8;
      const by = y - barH / 2;

      // Background
      ctx.fillStyle = 'rgba(22, 33, 62, 0.8)';
      ctx.strokeStyle = '#0f3460';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(bx, by, barW, barH, 3);
      ctx.fill();
      ctx.stroke();

      let fillPct;
      if (reloading) {
        const progress = Math.min((performance.now() - reloadStartAt) / reloadActualDur, 1);
        const startPct = reloadStartAmmo / maxAmmo;
        fillPct = startPct + (1 - startPct) * progress;
      } else {
        fillPct = ammo / maxAmmo;
      }

      const fillH = barH * fillPct;
      const isLow = ammo <= ds.reloadWarn && !reloading;
      ctx.fillStyle = isLow ? '#ef4444' : (reloading ? '#facc15' : '#ffffff');
      ctx.beginPath();
      ctx.roundRect(bx, by + barH - fillH, barW, fillH, 3);
      ctx.fill();
    }

    const ALIEN_COLORS = {
      blue:  { body: '#4e7fff', window: '#a0c4ff' },
      green: { body: '#22c55e', window: '#4ade80' },
      red:   { body: '#dc2626', window: '#f87171' },
    };

    function drawAlienShip(x, y, type, alienHp, maxHp) {
      const c = ALIEN_COLORS[type] || ALIEN_COLORS.blue;
      // Body
      ctx.fillStyle = c.body;
      ctx.beginPath();
      ctx.roundRect(x - ALIEN_W / 2, y - ALIEN_H / 2, ALIEN_W, ALIEN_H, 5);
      ctx.fill();
      // Window (slot pointing down)
      ctx.fillStyle = c.window;
      ctx.beginPath();
      ctx.roundRect(x - 7, y + ALIEN_H / 2 - 14, 14, 10, 3);
      ctx.fill();
      // HP indicator for multi-hp aliens
      if (maxHp > 1) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(alienHp, x, y - ALIEN_H / 2 - 4);
      }
    }

    function drawBullets() {
      // Player bullets
      ctx.fillStyle = '#a0c4ff';
      for (const b of playerBullets) {
        ctx.beginPath();
        ctx.roundRect(b.x - BULLET_W / 2, b.y - PLAYER_BULLET_H / 2, BULLET_W, PLAYER_BULLET_H, 2);
        ctx.fill();
        // Glow
        ctx.shadowColor = '#4e7fff';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Alien bullets
      const BULLET_COLORS = { blue: '#e94560', green: '#9ca3af', red: '#facc15' };
      for (const b of alienBullets) {
        const bc = BULLET_COLORS[b.type] || BULLET_COLORS.blue;
        ctx.fillStyle = bc;
        ctx.beginPath();
        ctx.roundRect(b.x - BULLET_W / 2, b.y - ALIEN_BULLET_H / 2, BULLET_W, ALIEN_BULLET_H, 2);
        ctx.fill();
        ctx.shadowColor = bc;
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    // --- UI ---

    function getHpColor(hp) {
      const ls = lifeSettings[lifeDifficulty];
      if (hp > ls.yellow) return 'linear-gradient(90deg, #22c55e, #4ade80)';
      if (hp > ls.orange) return 'linear-gradient(90deg, #eab308, #facc15)';
      if (hp > ls.red)    return 'linear-gradient(90deg, #f97316, #fb923c)';
      return 'linear-gradient(90deg, #dc2626, #ef4444)';
    }

    function flashDamage() {
      const el = document.getElementById('damage-flash');
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 150);
    }

    function flashPoison() {
      const el = document.getElementById('damage-flash');
      el.classList.add('flash-poison');
      setTimeout(() => el.classList.remove('flash-poison'), 150);
    }

    function flashSlow() {
      const el = document.getElementById('damage-flash');
      el.classList.add('flash-gray');
      setTimeout(() => el.classList.remove('flash-gray'), 150);
    }

    const ROMAN = ['', 'I', 'II', 'III', 'IV', 'V'];

    function applySlow() {
      const ds = diffSettings[difficulty];
      slowStacks++;
      const totalSlow = slowStacks * ds.slowPer;
      if (totalSlow >= 100) {
        immobilized = true;
        immobileEndTime = performance.now() + ds.immobileTime * 1000;
        slowStacks = 0;
        slowDecayAt = 0;
      } else {
        // Reset timer to 10s on every hit
        slowDecayAt = performance.now() + ds.slowDecay * 1000;
      }
      updateEffectsUI();
    }

    function updateSlowness(now) {
      if (immobilized) {
        if (now >= immobileEndTime) {
          immobilized = false;
          immobileEndTime = 0;
        }
        updateEffectsUI();
        return;
      }
      // Decay: when timer expires, remove one stack and reset timer
      if (slowStacks > 0 && slowDecayAt > 0 && now >= slowDecayAt) {
        slowStacks--;
        if (slowStacks > 0) {
          slowDecayAt = now + diffSettings[difficulty].slowDecay * 1000;
        } else {
          slowDecayAt = 0;
        }
      }
      if (slowStacks > 0 || immobilized || poisoned || speedStacks > 0 || shieldActive || multiStacks > 0 || pierceStacks > 0 || bombStacks > 0 || mysteryActive) updateEffectsUI();
      else if (!poisoned) { document.getElementById('effects-text').textContent = ''; }
    }

    function updateEffectsUI() {
      const el = document.getElementById('effects-text');
      let lines = [];

      if (immobilized) {
        const secs = Math.max(0, Math.ceil((immobileEndTime - performance.now()) / 1000));
        lines.push(`Immobilized (${secs}s)`);
      } else if (slowStacks > 0) {
        const secs = slowDecayAt > 0 ? Math.max(0, Math.ceil((slowDecayAt - performance.now()) / 1000)) : 0;
        lines.push(`Slowness ${ROMAN[slowStacks] || slowStacks} (${secs}s)`);
      }

      if (poisoned) {
        lines.push(`Poison (${poisonKillsLeft} kills left)`);
      }

      // Powerup buffs
      if (mysteryActive) {
        const secs = Math.max(0, Math.ceil((mysteryExpireAt - performance.now()) / 1000));
        lines.push(`<span style="color:#fff;text-shadow:0 0 8px #fff">??? (${secs}s)</span>`);
      } else {
        if (speedStacks > 0) {
          const secs = speedDecayAt > 0 ? Math.max(0, Math.ceil((speedDecayAt - performance.now()) / 1000)) : 0;
          lines.push(`<span style="color:#22c55e">Speed ${ROMAN[speedStacks] || speedStacks} (${secs}s)</span>`);
        }
        if (shieldActive) {
          const secs = Math.max(0, Math.ceil((shieldExpireAt - performance.now()) / 1000));
          lines.push(`<span style="color:#3b82f6">Shield (${secs}s)</span>`);
        }
        if (multiStacks > 0) {
          const secs = multiDecayAt > 0 ? Math.max(0, Math.ceil((multiDecayAt - performance.now()) / 1000)) : 0;
          lines.push(`<span style="color:#f59e0b">Multishot ${ROMAN[multiStacks] || multiStacks} (${secs}s)</span>`);
        }
        if (pierceStacks > 0) {
          const secs = pierceDecayAt > 0 ? Math.max(0, Math.ceil((pierceDecayAt - performance.now()) / 1000)) : 0;
          lines.push(`<span style="color:#e879f9">Piercing ${ROMAN[pierceStacks] || pierceStacks} (${secs}s)</span>`);
        }
        if (bombStacks > 0) {
          const secs = bombDecayAt > 0 ? Math.max(0, Math.ceil((bombDecayAt - performance.now()) / 1000)) : 0;
          lines.push(`<span style="color:#ef4444">Bomb ${ROMAN[bombStacks] || bombStacks} (${secs}s)</span>`);
        }
      }

      el.innerHTML = lines.join('<br>');
      // Color priority: immobile > poison > slow warn
      if (immobilized) el.className = 'immobile';
      else if (poisoned) el.className = 'poison';
      else if (slowStacks >= 3) el.className = 'warn';
      else el.className = '';
    }

    function applyPoison() {
      const ds = diffSettings[difficulty];
      poisoned = true;
      poisonKillsLeft = ds.poisonCure;
      poisonNextDmgAt = performance.now() + ds.poisonInterval * 1000;
    }

    function updatePoison(now) {
      if (!poisoned) return;
      if (now >= poisonNextDmgAt) {
        if (lifeDifficulty !== 'god') {
          hp = Math.max(0, hp - 1);
          flashPoison();
          if (hp <= 0) {
            triggerDeath('Killed by poison');
            return;
          }
        }
        updateEffectsUI();
        poisonNextDmgAt = now + diffSettings[difficulty].poisonInterval * 1000;
      }
    }

    // --- Powerups ---
    const POWERUP_SIZE = 20;
    const POWERUP_FALL_SPEED = 2;
    const POWERUP_COLORS = { speed: '#22c55e', shield: '#3b82f6', multishot: '#f59e0b', pierce: '#e879f9', bomb: '#ef4444', mystery: '#fff' };
    const POWERUP_LABELS = { speed: 'SPD', shield: 'SHD', multishot: 'MUL', pierce: 'PRC', bomb: 'BMB', mystery: '???' };

    function spawnPowerup(x, y) {
      const ds = diffSettings[difficulty];
      if (Math.random() >= ds.powerupChance) return;
      const roll = Math.random();
      let type;
      if (roll < 0.4) type = 'speed';
      else if (roll < 0.6) type = 'shield';
      else if (roll < 0.8) type = 'multishot';
      else if (roll < 0.9) type = 'pierce';
      else if (roll < 0.99) type = 'bomb';
      else type = 'mystery';
      powerups.push({ x, y, type });
    }

    function collectPowerup(type) {
      const now = performance.now();
      if (type === 'speed') {
        speedStacks++;
        speedDecayAt = now + 12000;
      } else if (type === 'shield') {
        shieldActive = true;
        shieldExpireAt = now + diffSettings[difficulty].shieldTime * 1000;
      } else if (type === 'multishot') {
        multiStacks++;
        multiDecayAt = now + 8000;
      } else if (type === 'pierce') {
        pierceStacks++;
        pierceDecayAt = now + 6000;
      } else if (type === 'bomb') {
        bombStacks++;
        bombDecayAt = now + 7000;
      } else if (type === 'mystery') {
        // Grant Speed II, Shield, Multishot II, Piercing I, Bomb II
        speedStacks = Math.max(speedStacks, 2);
        speedDecayAt = now + 12000;
        shieldActive = true;
        shieldExpireAt = now + diffSettings[difficulty].shieldTime * 1000;
        multiStacks = Math.max(multiStacks, 2);
        multiDecayAt = now + 8000;
        pierceStacks = Math.max(pierceStacks, 1);
        pierceDecayAt = now + 6000;
        bombStacks = Math.max(bombStacks, 2);
        bombDecayAt = now + 7000;
        mysteryActive = true;
        // Mystery label lasts as long as the shortest buff
        mysteryExpireAt = now + 6000;
      }
    }

    function updatePowerupTimers(now) {
      if (speedStacks > 0 && speedDecayAt > 0 && now >= speedDecayAt) {
        speedStacks--;
        speedDecayAt = speedStacks > 0 ? now + 12000 : 0;
      }
      if (shieldActive && now >= shieldExpireAt) {
        shieldActive = false;
        shieldExpireAt = 0;
      }
      if (multiStacks > 0 && multiDecayAt > 0 && now >= multiDecayAt) {
        multiStacks--;
        multiDecayAt = multiStacks > 0 ? now + 8000 : 0;
      }
      if (pierceStacks > 0 && pierceDecayAt > 0 && now >= pierceDecayAt) {
        pierceStacks--;
        pierceDecayAt = pierceStacks > 0 ? now + 6000 : 0;
      }
      if (bombStacks > 0 && bombDecayAt > 0 && now >= bombDecayAt) {
        bombStacks--;
        bombDecayAt = bombStacks > 0 ? now + 7000 : 0;
      }
      if (mysteryActive && now >= mysteryExpireAt) {
        mysteryActive = false;
      }
    }

    // --- Alien death particles ---
    let deathParticles = [];
    const DEATH_COLORS = {
      blue: ['#4e7fff','#3b6fd9','#a0c4ff','#2255cc'],
      green: ['#22c55e','#16a34a','#4ade80','#15803d'],
      red: ['#dc2626','#ef4444','#ff6b6b','#b91c1c'],
    };

    function spawnDeathParticles(x, y, type) {
      const colors = DEATH_COLORS[type] || DEATH_COLORS.blue;
      for (let i = 0; i < 16; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 4;
        deathParticles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 2 + Math.random() * 4,
          alpha: 1,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.4,
        });
      }
    }

    function updateAndDrawDeathParticles() {
      for (let i = deathParticles.length - 1; i >= 0; i--) {
        const p = deathParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.rot += p.rotV;
        p.alpha -= 0.025;
        if (p.alpha <= 0) { deathParticles.splice(i, 1); continue; }
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    function drawPowerups() {
      for (const p of powerups) {
        let col = POWERUP_COLORS[p.type];
        if (p.type === 'mystery') {
          // Rainbow cycle
          const hue = (performance.now() / 5) % 360;
          col = `hsl(${hue}, 100%, 70%)`;
        }
        // Outer glow
        ctx.shadowColor = col;
        ctx.shadowBlur = p.type === 'mystery' ? 18 : 10;
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.roundRect(p.x - POWERUP_SIZE/2, p.y - POWERUP_SIZE/2, POWERUP_SIZE, POWERUP_SIZE, 5);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Label
        ctx.fillStyle = p.type === 'mystery' ? '#000' : '#fff';
        ctx.font = 'bold 9px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(POWERUP_LABELS[p.type], p.x, p.y);
      }
    }

    function drawShield() {
      if (!shieldActive) return;
      ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#3b82f6';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(player.x, player.y, PLAYER_W / 2 + 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.lineWidth = 1;
    }

    // --- Boss ---
    const BOSS_W = 100, BOSS_H = 60;
    const BOSS_SPEED = 1.5;

    function drawBoss() {
      if (!boss || !boss.alive) return;
      const x = boss.x, y = boss.y;
      // Body - dark purple
      ctx.fillStyle = '#7c3aed';
      ctx.shadowColor = '#7c3aed';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.roundRect(x - BOSS_W / 2, y - BOSS_H / 2, BOSS_W, BOSS_H, 10);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Inner highlight
      ctx.fillStyle = '#8b5cf6';
      ctx.beginPath();
      ctx.roundRect(x - BOSS_W / 2 + 5, y - BOSS_H / 2 + 4, BOSS_W - 10, 8, 4);
      ctx.fill();
      // Window
      ctx.fillStyle = '#c4b5fd';
      ctx.beginPath();
      ctx.roundRect(x - 16, y + BOSS_H / 2 - 20, 32, 14, 4);
      ctx.fill();
      // HP bar above boss
      const barW = BOSS_W + 20, barH = 6;
      const bx = x - barW / 2, by = y - BOSS_H / 2 - 14;
      ctx.fillStyle = '#16213e';
      ctx.fillRect(bx, by, barW, barH);
      const pct = boss.hp / boss.maxHp;
      ctx.fillStyle = pct > 0.5 ? '#7c3aed' : pct > 0.25 ? '#f59e0b' : '#ef4444';
      ctx.fillRect(bx, by, barW * pct, barH);
      ctx.strokeStyle = '#0f3460';
      ctx.strokeRect(bx, by, barW, barH);
      // HP text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`${boss.hp} / ${boss.maxHp}`, x, by - 4);
    }

    function bossAttack() {
      if (!boss || !boss.alive) return;
      // Create two rows of bullets in front of the boss, then fire them
      const rowY1 = boss.y + BOSS_H / 2 + 10;
      const rowY2 = boss.y + BOSS_H / 2 + 25;
      const count = 8 + Math.floor(Math.random() * 5); // 8-12 bullets per row
      for (let row = 0; row < 2; row++) {
        const ry = row === 0 ? rowY1 : rowY2;
        for (let i = 0; i < count; i++) {
          const bx = boss.x - BOSS_W / 2 + Math.random() * BOSS_W;
          const angle = Math.PI / 2 + (Math.random() - 0.5) * 1.2; // mostly downward, spread out
          const speed = 2 + Math.random() * 3;
          alienBullets.push({
            x: bx,
            y: ry,
            type: 'blue',
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
          });
        }
      }
    }

    function updateBoss(now) {
      if (!boss || !boss.alive) return;
      // Move side to side
      boss.x += BOSS_SPEED * boss.dir;
      if (boss.x + BOSS_W / 2 > canvas.width - 30) boss.dir = -1;
      if (boss.x - BOSS_W / 2 < 30) boss.dir = 1;

      // Attack on interval
      const interval = diffSettings[difficulty].bossInterval * 1000;
      if (now - bossLastShot >= interval) {
        bossAttack();
        bossLastShot = now;
      }
    }

    // --- Fire particles for hardcore heart ---
    let fireRunning = false;
    let fireParticles = [];
    const fireCanvas = document.getElementById('fire-canvas');
    const fireCtx = fireCanvas.getContext('2d');

    function startFire() {
      fireRunning = true;
      fireParticles = [];
      animateFire();
    }

    function stopFire() {
      fireRunning = false;
      fireParticles = [];
      fireCtx.clearRect(0, 0, fireCanvas.width, fireCanvas.height);
      fireCanvas.classList.remove('show');
    }

    function animateFire() {
      if (!fireRunning) return;
      fireCtx.clearRect(0, 0, fireCanvas.width, fireCanvas.height);

      // Spawn new particles from both sides of the heart
      for (let i = 0; i < 5; i++) {
        fireParticles.push({
          x: 70 + (Math.random() - 0.5) * 60,
          y: 70 + Math.random() * 15,
          vx: (Math.random() - 0.5) * 1.8,
          vy: -(1.5 + Math.random() * 3.5),
          life: 1,
          decay: 0.012 + Math.random() * 0.02,
          size: 2 + Math.random() * 6,
        });
      }

      for (let i = fireParticles.length - 1; i >= 0; i--) {
        const p = fireParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy -= 0.02; // rise faster
        p.vx += (Math.random() - 0.5) * 0.3; // sway
        p.life -= p.decay;
        if (p.life <= 0) { fireParticles.splice(i, 1); continue; }

        // Color: yellow core → orange → red → transparent
        let r, g, b;
        if (p.life > 0.7) { r = 255; g = 220 + (1 - p.life) * 100; b = 50; }
        else if (p.life > 0.4) { r = 255; g = 120 * p.life; b = 0; }
        else { r = 200; g = 30; b = 0; }

        fireCtx.globalAlpha = p.life * 0.8;
        fireCtx.fillStyle = `rgb(${r},${g},${b})`;
        fireCtx.beginPath();
        fireCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        fireCtx.fill();
      }
      fireCtx.globalAlpha = 1;

      requestAnimationFrame(animateFire);
    }

    function updateUI() {
      const maxHp = lifeSettings[lifeDifficulty].hp;
      const hcHeart = document.getElementById('hardcore-heart');
      const godHeart = document.getElementById('god-heart');
      if (lifeDifficulty === 'god') {
        document.getElementById('hp-text').style.display = 'none';
        document.getElementById('hp-bar').parentElement.style.display = 'none';
        document.getElementById('back-link-game').style.marginTop = '50px';
        hcHeart.classList.remove('show');
        document.getElementById('fire-canvas').classList.remove('show');
        godHeart.classList.add('show');
      } else if (lifeDifficulty === 'hardcore') {
        document.getElementById('hp-text').style.display = 'none';
        document.getElementById('hp-bar').parentElement.style.display = 'none';
        document.getElementById('back-link-game').style.marginTop = '50px';
        godHeart.classList.remove('show');
        hcHeart.classList.add('show');
        document.getElementById('fire-canvas').classList.add('show');
        if (!fireRunning) startFire();
      } else {
        hcHeart.classList.remove('show');
        godHeart.classList.remove('show');
        document.getElementById('fire-canvas').classList.remove('show');
        document.getElementById('back-link-game').style.marginTop = '4px';
        document.getElementById('hp-text').style.display = '';
        document.getElementById('hp-bar').parentElement.style.display = '';
        document.getElementById('hp-text').textContent = `HP: ${hp}`;
        const pct = Math.max(0, (hp / maxHp) * 100);
        document.getElementById('hp-bar').style.width = `${pct}%`;
        document.getElementById('hp-bar').style.background = getHpColor(hp);
      }
      document.getElementById('xp-text').textContent = `XP: ${score % 1 === 0 ? score : score.toFixed(1)}`;
    }

    function shatterHeart(callback) {
      const heart = document.getElementById('hardcore-heart');
      stopFire();
      // Step 1: move heart to center
      heart.classList.add('center');

      setTimeout(() => {
        // Step 2: hide heart, spawn particles
        heart.style.display = 'none';
        const sc = document.getElementById('shatter-canvas');
        sc.width = window.innerWidth;
        sc.height = window.innerHeight;
        sc.style.display = 'block';
        const sctx = sc.getContext('2d');
        const cx = sc.width / 2, cy = sc.height / 2;

        const pieces = [];
        for (let i = 0; i < 80; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 8;
          const size = 3 + Math.random() * 8;
          pieces.push({
            x: cx + (Math.random() - 0.5) * 30,
            y: cy + (Math.random() - 0.5) * 30,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            size: size,
            rot: Math.random() * Math.PI * 2,
            rotV: (Math.random() - 0.5) * 0.3,
            alpha: 1,
            color: ['#e94560','#ff4500','#dc2626','#ff6b6b','#b91c1c'][Math.floor(Math.random()*5)],
          });
        }

        let frame = 0;
        const totalFrames = 200;
        const fadeStartFrame = 30;
        function animateShatter() {
          sctx.clearRect(0, 0, sc.width, sc.height);

          let alive = false;
          for (const p of pieces) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.15;
            p.rot += p.rotV;
            p.alpha -= 0.006;
            if (p.alpha <= 0) continue;
            alive = true;
            sctx.save();
            sctx.translate(p.x, p.y);
            sctx.rotate(p.rot);
            sctx.globalAlpha = p.alpha;
            sctx.fillStyle = p.color;
            sctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            sctx.restore();
          }

          // Draw dark overlay ON TOP of particles so it's visible
          if (frame > fadeStartFrame) {
            const fadeProg = (frame - fadeStartFrame) / (totalFrames - fadeStartFrame);
            sctx.globalAlpha = Math.min(fadeProg, 1);
            sctx.fillStyle = '#1a1a2e';
            sctx.fillRect(0, 0, sc.width, sc.height);
            sctx.globalAlpha = 1;
          }

          frame++;
          if (alive && frame < totalFrames) {
            requestAnimationFrame(animateShatter);
          } else {
            sc.style.display = 'none';
            callback();
          }
        }
        animateShatter();
      }, 1700); // wait for heart to reach center
    }

    function triggerDeath(cause) {
      gameOver = true;
      updateUI();
      if (lifeDifficulty === 'hardcore') {
        shatterHeart(() => deathStats(cause));
      } else {
        deathStats(cause);
      }
    }

    function deathStats(cause) {
      const xp = score % 1 === 0 ? score : score.toFixed(1);
      document.getElementById('overlay-title').textContent = 'Game Over';
      document.getElementById('overlay-msg').innerHTML =
        `<div style="margin-bottom:10px;font-size:1.1rem">${cause}</div>` +
        `<div style="margin-bottom:12px">XP: ${xp} &nbsp;|&nbsp; Wave: ${wave}</div>` +
        `<div style="display:inline-grid;grid-template-columns:auto auto;gap:2px 16px;text-align:left;font-size:0.9rem">` +
        `<span style="color:#4e7fff">Blue killed:</span><span>${kills.blue}</span>` +
        `<span style="color:#22c55e">Green killed:</span><span>${kills.green}</span>` +
        `<span style="color:#dc2626">Red killed:</span><span>${kills.red}</span>` +
        `<span style="color:#7c3aed">Bosses killed:</span><span>${kills.boss}</span>` +
        `</div>`;
      document.getElementById('overlay-btn').textContent = 'Play Again';
      overlayMode = 'menu';
      document.getElementById('overlay').classList.add('show');
    }

    let overlayMode = 'menu';

    function showOverlay(title, msg, btnText, mode) {
      document.getElementById('overlay-title').textContent = title;
      document.getElementById('overlay-msg').innerText = msg;
      document.getElementById('overlay-btn').textContent = btnText || 'Play Again';
      overlayMode = mode || 'menu';
      document.getElementById('overlay').classList.add('show');
    }

    function hideOverlay() {
      document.getElementById('overlay').classList.remove('show');
    }

    // --- Update ---

    function update() {
      if (gameOver || gameWon) return;

      // Player movement
      let dx = 0;
      if (!immobilized) {
        if (keys['ArrowLeft'] || keys['KeyA'] || btnLeftDown) dx -= PLAYER_SPEED;
        if (keys['ArrowRight'] || keys['KeyD'] || btnRightDown) dx += PLAYER_SPEED;
        const slowPct = Math.min(slowStacks * diffSettings[difficulty].slowPer, 100);
        dx *= (1 - slowPct / 100);
        if (speedStacks > 0) dx *= (1 + speedStacks * 0.2);
      }
      player.x = Math.max(PLAYER_W / 2, Math.min(canvas.width - PLAYER_W / 2, player.x + dx));

      // Reload tick
      const now = performance.now();
      if (reloadEnabled && reloading) {
        if (now >= reloadStartAt + reloadActualDur) {
          reloading = false;
          ammo = maxAmmo;
        }
      }

      // Manual reload (R key)
      if (reloadEnabled && !reloading && ammo < maxAmmo && keys['KeyR']) {
        startReload(now);
      }

      // Shooting
      const canShoot = !immobilized && (!reloadEnabled || (!reloading && ammo > 0));
      if (canShoot && (keys['Space'] || shooting || touchShooting) && now - lastShot > SHOOT_COOLDOWN) {
        const totalBullets = 1 + multiStacks;
        const by = player.y - PLAYER_H / 2 - 14;
        const angleStep = 0.12;
        for (let bi = 0; bi < totalBullets; bi++) {
          const offset = bi - (totalBullets - 1) / 2;
          const vx = offset * PLAYER_BULLET_SPEED * Math.sin(angleStep);
          playerBullets.push({ x: player.x, y: by, vx });
        }
        lastShot = now;
        if (reloadEnabled) {
          ammo--;
          if (ammo <= 0) {
            startReload(now);
          }
        }
      }

      // Move player bullets
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        playerBullets[i].y -= PLAYER_BULLET_SPEED;
        playerBullets[i].x += (playerBullets[i].vx || 0);
        if (playerBullets[i].y < -20 || playerBullets[i].x < -20 || playerBullets[i].x > canvas.width + 20) playerBullets.splice(i, 1);
      }

      // Alien group movement
      let leftMost = Infinity, rightMost = -Infinity;
      for (const a of aliens) {
        if (!a.alive) continue;
        if (a.x - ALIEN_W / 2 < leftMost) leftMost = a.x - ALIEN_W / 2;
        if (a.x + ALIEN_W / 2 > rightMost) rightMost = a.x + ALIEN_W / 2;
      }

      const edgePad = 40;
      if (rightMost + alienSpeed * alienDir > canvas.width - edgePad || leftMost + alienSpeed * alienDir < edgePad) {
        alienDir *= -1;
        alienStepDown = 20 * diffSettings[difficulty].dropSpeed;
      }

      for (const a of aliens) {
        if (!a.alive) continue;
        a.x += alienSpeed * alienDir;
        if (alienStepDown > 0) a.y += 0.5 * diffSettings[difficulty].dropSpeed;
      }
      if (alienStepDown > 0) alienStepDown--;

      // Alien shooting (5% chance per second per alien → per frame ~0.083% at 60fps)
      const shootChance = diffSettings[difficulty].shootChance / 60;
      for (const a of aliens) {
        if (!a.alive) continue;
        if (Math.random() < shootChance) {
          if (a.type === 'red') {
            // Red aliens randomly shoot yellow (poison) or regular (red) bullets
            const bulletType = Math.random() < 0.5 ? 'red' : 'blue';
            alienBullets.push({ x: a.x, y: a.y + ALIEN_H / 2, type: bulletType });
          } else {
            alienBullets.push({ x: a.x, y: a.y + ALIEN_H / 2, type: a.type });
          }
        }
      }

      // Move alien bullets
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        const ab = alienBullets[i];
        if (ab.vy !== undefined) {
          ab.x += ab.vx;
          ab.y += ab.vy;
        } else {
          ab.y += ALIEN_BULLET_SPEED;
        }
        if (ab.y > canvas.height + 20 || ab.x < -20 || ab.x > canvas.width + 20) alienBullets.splice(i, 1);
      }

      // Helper: process an alien kill (XP, powerup, poison cure, bomb chain)
      function onAlienKill(a, fromBomb) {
        a.alive = false;
        spawnDeathParticles(a.x, a.y, a.type);
        const xpGain = a.type === 'red' ? 3 : a.type === 'green' ? 1.5 : 1;
        score += xpGain;
        kills[a.type]++;
        if (!fromBomb) spawnPowerup(a.x, a.y);
        if (poisoned) {
          poisonKillsLeft--;
          if (poisonKillsLeft <= 0) {
            poisoned = false;
            poisonKillsLeft = 0;
            poisonNextDmgAt = 0;
          }
        }
      }

      // Bomb chain: kill N+1 nearest alive aliens expanding outward
      function bombChain(origin) {
        if (bombStacks <= 0) return;
        const count = bombStacks + 1; // level I = 2, II = 3, etc.
        const killed = [origin];
        let remaining = count;

        while (remaining > 0) {
          // Find the nearest alive alien to any already-killed alien
          let bestDist = Infinity, bestAlien = null;
          for (const a of aliens) {
            if (!a.alive) continue;
            if (killed.includes(a)) continue;
            for (const k of killed) {
              const d = Math.abs(a.x - k.x) + Math.abs(a.y - k.y);
              if (d < bestDist) { bestDist = d; bestAlien = a; }
            }
          }
          if (!bestAlien) break;
          bestAlien.hp = 0;
          onAlienKill(bestAlien, true);
          killed.push(bestAlien);
          remaining--;
        }
      }

      // Collision: player bullets → aliens
      for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
        const b = playerBullets[bi];
        const maxPierce = 1 + pierceStacks; // level 0 = 1 hit, I = 2, II = 3...
        let hits = 0;
        for (const a of aliens) {
          if (!a.alive) continue;
          if (Math.abs(b.x - a.x) < ALIEN_W / 2 + BULLET_W / 2 &&
              Math.abs(b.y - a.y) < ALIEN_H / 2 + PLAYER_BULLET_H / 2) {
            a.hp--;
            if (a.hp <= 0) {
              onAlienKill(a, false);
              bombChain(a);
            }
            hits++;
            if (hits >= maxPierce) {
              playerBullets.splice(bi, 1);
              break;
            }
          }
        }
        updateUI();
      }

      // Boss update
      updateBoss(now);

      // Collision: player bullets → boss
      if (boss && boss.alive) {
        for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
          const b = playerBullets[bi];
          if (Math.abs(b.x - boss.x) < BOSS_W / 2 + BULLET_W / 2 &&
              Math.abs(b.y - boss.y) < BOSS_H / 2 + PLAYER_BULLET_H / 2) {
            playerBullets.splice(bi, 1);
            boss.hp--;
            if (boss.hp <= 0) {
              boss.alive = false;
              score += boss.maxHp / 10;
              kills.boss++;
              spawnDeathParticles(boss.x, boss.y, 'red');
              spawnDeathParticles(boss.x - 20, boss.y, 'blue');
              spawnDeathParticles(boss.x + 20, boss.y, 'blue');
            }
            break;
          }
        }
      }

      // Collision: alien bullets → player
      const isGod = lifeDifficulty === 'god';
      for (let i = alienBullets.length - 1; i >= 0; i--) {
        const b = alienBullets[i];
        if (Math.abs(b.x - player.x) < PLAYER_W / 2 + BULLET_W / 2 &&
            Math.abs(b.y - player.y) < PLAYER_H / 2 + ALIEN_BULLET_H / 2) {
          alienBullets.splice(i, 1);
          if (b.type === 'green') {
            if (!isGod && !godImmuneBad && !godImmuneAll) { applySlow(); flashSlow(); }
            if (!isGod) {
              if (shieldActive) {
                shieldActive = false; shieldExpireAt = 0;
              } else {
                const gDmg = diffSettings[difficulty].greenDmg;
                if (gDmg > 0) hp = Math.max(0, hp - gDmg);
              }
            }
          } else if (b.type === 'red') {
            if (!isGod && !godImmuneBad && !godImmuneAll) applyPoison();
            if (!isGod) {
              if (shieldActive) {
                shieldActive = false; shieldExpireAt = 0;
              } else {
                hp = Math.max(0, hp - diffSettings[difficulty].bulletDmg);
                flashDamage();
              }
            }
          } else {
            if (!isGod) {
              if (shieldActive) {
                shieldActive = false; shieldExpireAt = 0;
              } else {
                hp = Math.max(0, hp - diffSettings[difficulty].bulletDmg);
                flashDamage();
              }
            }
          }
          updateUI();
          if (!isGod && hp <= 0) {
            triggerDeath('Shot down by aliens');
            return;
          }
        }
      }

      // Slowness / immobilization tick
      if (!godImmuneBad && !godImmuneAll) updateSlowness(now);
      // Poison tick
      if (!godImmuneBad && !godImmuneAll) updatePoison(now);
      // Powerup timers
      updatePowerupTimers(now);
      // Always update effects display
      updateEffectsUI();

      // Move & collect powerups
      for (let i = powerups.length - 1; i >= 0; i--) {
        powerups[i].y += POWERUP_FALL_SPEED;
        if (powerups[i].y > canvas.height + 30) { powerups.splice(i, 1); continue; }
        const p = powerups[i];
        if (Math.abs(p.x - player.x) < PLAYER_W / 2 + POWERUP_SIZE / 2 &&
            Math.abs(p.y - player.y) < PLAYER_H / 2 + POWERUP_SIZE / 2) {
          if (!godImmuneAll) collectPowerup(p.type);
          powerups.splice(i, 1);
        }
      }

      // Check if aliens reached player
      for (const a of aliens) {
        if (a.alive && a.y + ALIEN_H / 2 >= player.y - PLAYER_H / 2) {
          if (isGod) {
            gameOver = true;
            showOverlay('The aliens have reached the bottom', '', 'New Game', 'menu');
          } else {
            triggerDeath('The aliens reached you');
          }
          return;
        }
      }

      // Win check
      const won = boss ? !boss.alive : aliens.every(a => !a.alive);
      if (won) {
        gameWon = true;
        showOverlay('Wave Defeated!', `Next wave: ${alienRows + 1} rows of aliens.`, 'Start Next Wave', 'wave');
      }
    }

    // --- Game loop ---
    let loopRunning = false;

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawStars();

      if (!gameOver && !gameWon) update();

      // Draw aliens
      for (const a of aliens) {
        if (a.alive) {
          const ds = diffSettings[difficulty];
          const maxHp = a.type === 'red' ? ds.redHp : a.type === 'green' ? ds.greenHp : 1;
          drawAlienShip(a.x, a.y, a.type, a.hp, maxHp);
        }
      }

      // Draw boss
      drawBoss();

      // Draw powerups
      drawPowerups();

      // Draw player
      drawPlayerShip(player.x, player.y);
      drawReloadBar(player.x, player.y);
      drawShield();

      // Draw bullets
      drawBullets();

      // Alien death particles
      updateAndDrawDeathParticles();

      requestAnimationFrame(loop);
    }

    // --- Input ---

    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space') e.preventDefault();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // On-screen buttons
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');

    btnLeft.addEventListener('mousedown', e => { e.preventDefault(); btnLeftDown = true; });
    btnLeft.addEventListener('mouseup', () => { btnLeftDown = false; });
    btnLeft.addEventListener('mouseleave', () => { btnLeftDown = false; });
    btnLeft.addEventListener('touchstart', e => { e.preventDefault(); btnLeftDown = true; });
    btnLeft.addEventListener('touchend', () => { btnLeftDown = false; });

    btnRight.addEventListener('mousedown', e => { e.preventDefault(); btnRightDown = true; });
    btnRight.addEventListener('mouseup', () => { btnRightDown = false; });
    btnRight.addEventListener('mouseleave', () => { btnRightDown = false; });
    btnRight.addEventListener('touchstart', e => { e.preventDefault(); btnRightDown = true; });
    btnRight.addEventListener('touchend', () => { btnRightDown = false; });

    // Touch/click to shoot (not on buttons or back link), tap ship to reload
    function isOnShip(cx, cy) {
      if (!player) return false;
      return Math.abs(cx - player.x) < PLAYER_W && Math.abs(cy - player.y) < PLAYER_H;
    }
    function tryTapReload(cx, cy) {
      if (reloadEnabled && !reloading && ammo < maxAmmo && isOnShip(cx, cy)) {
        startReload(performance.now());
        return true;
      }
      return false;
    }
    canvas.addEventListener('mousedown', e => {
      if (!tryTapReload(e.clientX, e.clientY)) touchShooting = true;
    });
    canvas.addEventListener('mouseup', () => { touchShooting = false; });
    canvas.addEventListener('touchstart', e => {
      const t = e.touches[0];
      if (!tryTapReload(t.clientX, t.clientY)) touchShooting = true;
    });
    canvas.addEventListener('touchend', () => { touchShooting = false; });

    // Overlay button — next wave or back to menu
    document.getElementById('overlay-btn').addEventListener('click', () => {
      if (overlayMode === 'wave') {
        nextWave();
      } else {
        hideOverlay();
        const hh = document.getElementById('hardcore-heart');
        hh.classList.remove('show', 'center');
        hh.style.display = '';
        document.getElementById('god-heart').classList.remove('show');
        document.getElementById('shatter-canvas').style.display = 'none';
        stopFire();
        menuEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
