<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spikes - Horsey Games</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body { overflow: hidden; margin: 0; background: #0a0e27; display: block; }
    canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    .back-link { z-index: 30; }

    #dialogue {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: #a0c4ff;
      font-size: 1.2rem;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s;
      max-width: 90%;
    }

    #dialogue.hidden { opacity: 0; }

    #timer {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    #overlay.hidden { display: none; }
    .hidden { display: none !important; }

    #overlay h1 {
      font-size: 2.5rem;
      color: #e94560;
      margin-bottom: 0.5rem;
    }

    #overlay .sub { color: #a0c4ff; font-size: 1.2rem; margin-bottom: 0.3rem; }
    #overlay .time { color: #4ade80; font-size: 1.8rem; font-weight: bold; margin-bottom: 1.5rem; }

    #overlay button {
      font-size: 1.2rem;
      padding: 0.8rem 2.5rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, #e94560, #c73652);
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
      transition: box-shadow 0.3s, transform 0.15s;
    }

    #overlay button:hover {
      box-shadow: 0 0 35px rgba(233, 69, 96, 0.5);
      transform: scale(1.05);
    }

    /* Modifier menu */
    #menu {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 1rem;
    }
    #menu.hidden { display: none; }
    #menu h1 {
      font-size: 2.8rem;
      color: #e94560;
      margin: 0 0 0.2rem;
    }
    #menu .subtitle {
      color: #6b8ecf;
      font-size: 1rem;
      margin-bottom: 1.6rem;
    }
    .modifier-grid {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
      width: min(90vw, 420px);
    }
    .mod-btn {
      padding: 0.85rem 1.2rem;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      color: #a0c4ff;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .mod-btn:hover { background: #0f3460; transform: translateY(-2px); }
    .mod-btn.selected {
      border-color: #e94560;
      background: #2a1d36;
      box-shadow: 0 0 18px rgba(233, 69, 96, 0.3);
    }
    .mod-label { font-weight: 600; margin-bottom: 4px; font-size: 1.05rem; }
    .mod-desc { font-size: 0.8rem; color: #6b8ecf; }
    #start-btn {
      font-size: 1.2rem;
      padding: 0.8rem 2.5rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, #e94560, #c73652);
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
      transition: box-shadow 0.3s, transform 0.15s;
    }
    #start-btn:hover {
      box-shadow: 0 0 35px rgba(233, 69, 96, 0.5);
      transform: scale(1.05);
    }
    #menu .back-link-menu {
      position: absolute;
      top: 1.2rem;
      left: 1.5rem;
      color: #a0c4ff;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.15s;
    }
    #menu .back-link-menu:hover { color: #fff; }
  </style>
</head>
<body>
  <div id="menu">
    <a href="../games.html" class="back-link-menu">&larr; All Games</a>
    <h1>Spikes</h1>
    <p class="subtitle">Pick any modifiers (or none) and start</p>
    <div class="modifier-grid">
      <button class="mod-btn" data-mod="tooMuch">
        <div class="mod-label">Bob ate too much</div>
      </button>
      <button class="mod-btn" data-mod="energyDrink">
        <div class="mod-label">Bob brought an energy drink</div>
      </button>
      <button class="mod-btn" data-mod="ragingSpikes">
        <div class="mod-label">The spikes are raging</div>
      </button>
    </div>
    <button id="start-btn">Start Game</button>
  </div>

  <a href="../games.html" class="back-link">&larr; All Games</a>
  <canvas id="game"></canvas>
  <div id="dialogue">Welcome to Spikes! You are controlling Bob! Don't let him die!</div>
  <div id="timer">0.0s</div>
  <div id="overlay" class="hidden">
    <h1 id="ov-title">Game Over</h1>
    <p class="sub" id="ov-sub">Well, better luck next time!</p>
    <div class="time" id="ov-time"></div>
    <button id="ov-btn">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const dialogueEl = document.getElementById('dialogue');
    const timerEl = document.getElementById('timer');
    const overlay = document.getElementById('overlay');
    const ovTime = document.getElementById('ov-time');
    const ovBtn = document.getElementById('ov-btn');

    // --- Audio ---
    let audioCtx;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playNoise(duration, volume, filterFreq, filterQ) {
      ensureAudio();
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const filt = audioCtx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = filterFreq;
      filt.Q.value = filterQ || 1;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      src.connect(filt); filt.connect(gain); gain.connect(audioCtx.destination);
      src.start(); src.stop(audioCtx.currentTime + duration);
    }

    function playTone(freq, duration, volume, type) {
      ensureAudio();
      const osc = audioCtx.createOscillator();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    // Phoom — spike impacts ground (cave stalactite crash feel)
    function sndPhoom() {
      ensureAudio();
      const t = audioCtx.currentTime;
      // Low thud that drops in pitch
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, t);
      osc.frequency.exponentialRampToValueAtTime(35, t + 0.2);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.7, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(t + 0.25);
      // Short filtered noise for the debris/dust
      playNoise(0.1, 0.25, 800, 1);
    }

    // Tink — green spike takes damage (short, sharp, stone-on-stone)
    function sndTink() {
      ensureAudio();
      const t = audioCtx.currentTime;
      // Very short noise burst — like stone chipping
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const filt = audioCtx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.frequency.value = 4000;
      filt.Q.value = 5;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.6, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      src.connect(filt); filt.connect(gain); gain.connect(audioCtx.destination);
      src.start(); src.stop(t + 0.05);
    }

    // Green spike breaks — phoom + extra crumble
    function sndCrashBig() {
      sndPhoom();
      playNoise(0.2, 0.4, 1200, 2);
    }

    // Bling — red spike splits
    function sndBling() {
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(1400, t + 0.12);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(t + 0.2);
      // Second harmonic
      const osc2 = audioCtx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(900, t + 0.03);
      osc2.frequency.exponentialRampToValueAtTime(1800, t + 0.15);
      const gain2 = audioCtx.createGain();
      gain2.gain.setValueAtTime(0.15, t + 0.03);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc2.connect(gain2); gain2.connect(audioCtx.destination);
      osc2.start(t + 0.03); osc2.stop(t + 0.2);
    }

    // Big boom — yellow spike explosion
    function sndBoom() {
      ensureAudio();
      const t = audioCtx.currentTime;
      // Low rumble
      const osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.5);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(t + 0.5);
      // Burst noise
      playNoise(0.35, 0.4, 1500, 1);
    }

    // --- Constants ---
    const GROUND_H = 40;
    const GRAVITY = 0.6;
    const JUMP_FORCE = -13;
    const MOVE_SPEED = 5;
    const BOB_H = 60; // total stickman height
    const BOB_HEAD_R = 10;
    const SPIKE_START_DELAY = 3000; // ms before spikes start

    // --- Modifiers ---
    const modifiers = { tooMuch: false, energyDrink: false, ragingSpikes: false };
    const TOO_MUCH_SLOW = 1.3;
    const DRINK_SPEED_MULT = 1.5;
    const DRINK_JUMP_MULT = 1.25;
    const DRINK_DURATION = 2500; // ms
    const RAGING_TIME_OFFSET = 18; // seconds head start
    const RAGING_RATE_MULT = 1.3;
    const RAGING_START_DELAY = 800; // ms before spikes start in raging mode

    // Point-in-triangle test using barycentric coordinates
    function pointInTriangle(px, py, ax, ay, bx, by, cx, cy) {
      const d1 = (px - bx) * (ay - by) - (ax - bx) * (py - by);
      const d2 = (px - cx) * (by - cy) - (bx - cx) * (py - cy);
      const d3 = (px - ax) * (cy - ay) - (cx - ax) * (py - ay);
      const hasNeg = (d1 < 0) || (d2 < 0) || (d3 < 0);
      const hasPos = (d1 > 0) || (d2 > 0) || (d3 > 0);
      return !(hasNeg && hasPos);
    }

    // --- State ---
    let bob, spikes, landed, particles, keys;
    let gameRunning, dead, startTime, survivalTime;
    let spikeTimer, lastSpike;
    let deathTime, deathAngle;
    let w, h, groundY;
    let drinkEndTime, spikeStartDelay;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      groundY = h - GROUND_H;
    }
    window.addEventListener('resize', resize);
    resize();

    function init() {
      bob = {
        x: w / 2,
        y: groundY,
        vx: 0,
        vy: 0,
        onGround: true,
        falling: false,
        facing: 1, // 1 = right, -1 = left
        drinking: modifiers.energyDrink,
      };
      spikes = [];
      landed = []; // green spikes stuck in the ground: { x, topY, size, stack }
      particles = [];
      explosions = [];
      keys = {};
      gameRunning = true;
      dead = false;
      startTime = performance.now();
      survivalTime = 0;
      spikeStartDelay = modifiers.ragingSpikes ? RAGING_START_DELAY : SPIKE_START_DELAY;
      lastSpike = startTime + spikeStartDelay;
      drinkEndTime = startTime + DRINK_DURATION;
      deathTime = 0;
      deathAngle = 0;
      if (modifiers.energyDrink) {
        dialogueEl.textContent = "Bob is chugging his energy drink...";
      } else if (modifiers.ragingSpikes) {
        dialogueEl.textContent = "The spikes are raging! Good luck, Bob!";
      } else {
        dialogueEl.textContent = "Welcome to Spikes! You are controlling Bob! Don't let him die!";
      }
      dialogueEl.classList.remove('hidden');
      overlay.classList.add('hidden');
      timerEl.style.display = '';
    }

    // --- Difficulty ---
    function getDifficulty() {
      let t = survivalTime; // seconds survived
      if (modifiers.ragingSpikes) t = (t + RAGING_TIME_OFFSET) * RAGING_RATE_MULT;
      const spikeSize = 20 + t * 1.5; // grows over time
      const fallSpeed = 2 + t * 0.15; // gets faster
      const spawnInterval = Math.max(300, 2000 - t * 40); // gets more frequent, min 300ms
      return { spikeSize, fallSpeed, spawnInterval };
    }

    // --- Shatter colors per spike type ---
    const SHATTER_COLORS = {
      gray:   ['#9ca3af', '#d1d5db'],
      green:  ['#22c55e', '#4ade80'],
      red:    ['#ef4444', '#f87171'],
      yellow: ['#eab308', '#facc15'],
    };

    // --- Particles ---
    function spawnShatter(x, y, size, spikeColor) {
      const colors = SHATTER_COLORS[spikeColor] || SHATTER_COLORS.gray;
      const count = 6 + Math.floor(size / 5);
      for (let i = 0; i < count; i++) {
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
        const spd = 2 + Math.random() * 4;
        particles.push({
          x: x + (Math.random() - 0.5) * size * 0.5,
          y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd - 2,
          life: 1,
          decay: 0.02 + Math.random() * 0.02,
          radius: 2 + Math.random() * 3,
          color: colors[Math.floor(Math.random() * colors.length)],
        });
      }
    }

    // --- Explosions (yellow spike) ---
    let explosions; // { x, y, radius, maxRadius, life }

    function spawnExplosion(x, y, size) {
      const maxR = size * 2.5 + 40;
      explosions.push({ x, y, radius: 0, maxRadius: maxR, life: 1 });
    }

    function updateExplosions() {
      for (let i = explosions.length - 1; i >= 0; i--) {
        const e = explosions[i];
        // Expand quickly
        e.radius += (e.maxRadius - e.radius) * 0.15;
        e.life -= 0.025;
        if (e.life <= 0) { explosions.splice(i, 1); continue; }

        // Check if Bob is in the explosion (only while expanding, first 0.7 life)
        if (e.life > 0.3 && !dead) {
          const dx = bob.x - e.x;
          const dy = (bob.y - BOB_H * 0.5) - e.y;
          if (dx * dx + dy * dy <= e.radius * e.radius) {
            triggerDeath(performance.now());
          }
        }

        // Destroy landed green spikes in radius
        for (let j = landed.length - 1; j >= 0; j--) {
          const L = landed[j];
          const dx = L.x - e.x;
          const dy = L.topY - e.y;
          if (dx * dx + dy * dy <= e.radius * e.radius) {
            spawnShatter(L.x, L.topY, L.size, 'green');
            landed.splice(j, 1);
          }
        }
      }
    }

    function drawExplosions() {
      for (const e of explosions) {
        ctx.save();
        ctx.globalAlpha = e.life * 0.5;
        ctx.fillStyle = '#facc15';
        ctx.shadowColor = '#facc15';
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Bright center
        ctx.globalAlpha = e.life * 0.7;
        ctx.fillStyle = '#fef08a';
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius * 0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // --- Draw Bob ---
    function drawBob() {
      const { x, y } = bob;
      const now = performance.now();
      ctx.save();
      ctx.translate(x, y);

      const moving = !dead && (bob.vx !== 0);
      const inAir = !dead && !bob.onGround;
      const isDrinking = bob.drinking && !dead;

      // Death topple
      if (dead && !bob.falling) {
        const elapsed = (now - deathTime) / 1000;
        deathAngle = Math.min(Math.PI / 2, elapsed * 3);
        ctx.rotate(deathAngle * bob.facing);
      }

      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';

      // Walk timer (smooth sine based on time, only when moving)
      const t = moving ? Math.sin(now * 0.008) : 0;

      // --- Proportions ---
      const headY = -BOB_H + BOB_HEAD_R;
      const neckY = -BOB_H + BOB_HEAD_R * 2;
      const hipY = -BOB_H * 0.35;
      const shoulderY = neckY + 4;

      // Head
      ctx.beginPath();
      ctx.arc(0, headY, BOB_HEAD_R, 0, Math.PI * 2);
      ctx.stroke();

      // Body — "ate too much" thickens just the torso, leaving a normal neck above
      if (modifiers.tooMuch) {
        // Thin neck stub
        ctx.beginPath();
        ctx.moveTo(0, neckY);
        ctx.lineTo(0, neckY + 5);
        ctx.stroke();
        // Thick torso starting below the neck, stopping above the hip
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.moveTo(0, neckY + 7);
        ctx.lineTo(0, hipY - 1);
        ctx.stroke();
        ctx.lineWidth = 2.5;
      } else {
        ctx.beginPath();
        ctx.moveTo(0, neckY);
        ctx.lineTo(0, hipY);
        ctx.stroke();
      }

      // --- Arms ---
      if (dead && !bob.falling) {
        // Limp arms hanging
        ctx.beginPath();
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(-10, shoulderY + 16);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(10, shoulderY + 16);
        ctx.stroke();
      } else if (isDrinking) {
        // Left arm hanging normally
        ctx.beginPath();
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(-10, shoulderY + 14);
        ctx.stroke();
        // Right arm bent up holding can to mouth
        ctx.beginPath();
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(8, shoulderY + 4);
        ctx.lineTo(6, neckY - 3);
        ctx.stroke();
        // Energy drink can
        ctx.fillStyle = '#dc2626';
        ctx.fillRect(2, neckY - 11, 9, 13);
        ctx.fillStyle = '#fbbf24';
        ctx.fillRect(2, neckY - 9, 9, 2);
        // Lightning bolt label
        ctx.save();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(7, neckY - 7);
        ctx.lineTo(5, neckY - 3);
        ctx.lineTo(7, neckY - 3);
        ctx.lineTo(5, neckY + 1);
        ctx.stroke();
        ctx.restore();
        // Bubbles rising from can
        const bubT = (now * 0.005) % 1;
        for (let b = 0; b < 3; b++) {
          const phase = (bubT + b * 0.33) % 1;
          ctx.globalAlpha = 1 - phase;
          ctx.fillStyle = '#fef3c7';
          ctx.beginPath();
          ctx.arc(4 + b * 2, neckY - 14 - phase * 8, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      } else if (inAir) {
        // Slight raise
        ctx.beginPath();
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(-12, shoulderY - 6);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(12, shoulderY - 6);
        ctx.stroke();
      } else {
        // Natural swing (opposite to legs)
        const aSwing = t * 6;
        ctx.beginPath();
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(-10 + aSwing, shoulderY + 14);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(10 - aSwing, shoulderY + 14);
        ctx.stroke();
      }

      // --- Legs ---
      if (dead && !bob.falling) {
        // Legs together, limp
        ctx.beginPath();
        ctx.moveTo(0, hipY);
        ctx.lineTo(-6, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, hipY);
        ctx.lineTo(6, 0);
        ctx.stroke();
      } else if (inAir) {
        // Legs slightly bent down
        ctx.beginPath();
        ctx.moveTo(0, hipY);
        ctx.lineTo(-7, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, hipY);
        ctx.lineTo(7, 0);
        ctx.stroke();
      } else {
        // Walking stride / idle stance
        const lSwing = moving ? t * 7 : 0;
        ctx.beginPath();
        ctx.moveTo(0, hipY);
        ctx.lineTo(-7 + lSwing, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, hipY);
        ctx.lineTo(7 - lSwing, 0);
        ctx.stroke();
      }

      // --- Eyes ---
      if (dead && !bob.falling) {
        // X eyes
        ctx.lineWidth = 1.5;
        const ey = headY - 1;
        ctx.beginPath();
        ctx.moveTo(-5, ey - 2); ctx.lineTo(-2, ey + 2);
        ctx.moveTo(-2, ey - 2); ctx.lineTo(-5, ey + 2);
        ctx.moveTo(2, ey - 2); ctx.lineTo(5, ey + 2);
        ctx.moveTo(5, ey - 2); ctx.lineTo(2, ey + 2);
        ctx.stroke();
      } else {
        ctx.fillStyle = '#e2e8f0';
        ctx.beginPath();
        ctx.arc(-3, headY - 1, 1.5, 0, Math.PI * 2);
        ctx.arc(3, headY - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    // --- Draw Spike ---
    const SPIKE_STYLES = {
      gray:  { fill: '#64748b', glow: '#94a3b8', stroke: '#94a3b8' },
      green: { fill: '#16a34a', glow: '#4ade80', stroke: '#4ade80' },
      red:   { fill: '#dc2626', glow: '#f87171', stroke: '#f87171' },
      yellow:{ fill: '#ca8a04', glow: '#facc15', stroke: '#facc15' },
    };

    function drawSpikeShape(x, y, size, color) {
      const halfW = size * 0.4;
      const st = SPIKE_STYLES[color] || SPIKE_STYLES.gray;
      ctx.save();
      ctx.shadowColor = st.glow;
      ctx.shadowBlur = 8;
      ctx.fillStyle = st.fill;
      ctx.beginPath();
      ctx.moveTo(x, y + size); // bottom point
      ctx.lineTo(x - halfW, y);
      ctx.lineTo(x + halfW, y);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = st.stroke;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawSpike(spike) {
      drawSpikeShape(spike.x, spike.y, spike.size, spike.color);
    }

    // Generate random crack lines that stay inside the spike triangle
    // The spike triangle: point-down, top-left (-1, 0), top-right (1, 0), bottom (0, 1)
    // At any ry (0..1), the max |rx| is (1 - ry) to stay inside
    function generateCracks(count, lengthSegs) {
      const cracks = [];
      for (let c = 0; c < count; c++) {
        const pts = [];
        let ry = 0.1 + Math.random() * 0.2;
        let maxRx = (1 - ry) * 0.85; // stay a bit inside the edge
        let rx = (Math.random() - 0.5) * maxRx;
        pts.push([rx, ry]);
        const segs = lengthSegs + Math.floor(Math.random() * 2);
        for (let s = 0; s < segs; s++) {
          ry += 0.1 + Math.random() * 0.15;
          ry = Math.min(0.92, ry);
          maxRx = (1 - ry) * 0.85;
          rx += (Math.random() - 0.5) * 0.4;
          rx = Math.max(-maxRx, Math.min(maxRx, rx));
          pts.push([rx, ry]);
        }
        // Sometimes add a branch from a middle point
        if (pts.length >= 3 && Math.random() > 0.3) {
          const bi = 1 + Math.floor(Math.random() * (pts.length - 2));
          const bp = pts[bi];
          const dir = Math.random() > 0.5 ? 1 : -1;
          const bry = bp[1] + (Math.random() - 0.3) * 0.1;
          const bmaxRx = (1 - bry) * 0.85;
          const brx = Math.max(-bmaxRx, Math.min(bmaxRx, bp[0] + dir * (0.15 + Math.random() * 0.2)));
          cracks.push({ pts: [[bp[0], bp[1]], [brx, bry]], width: 1.5 + Math.random() });
        }
        cracks.push({ pts, width: 2 + Math.random() * 1.5 });
      }
      return cracks;
    }

    // Small particle burst when a green spike cracks
    function spawnCrackBurst(x, y, size) {
      const count = 4 + Math.floor(Math.random() * 4);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = 1 + Math.random() * 2.5;
        particles.push({
          x: x + (Math.random() - 0.5) * size * 0.3,
          y: y + size * (0.2 + Math.random() * 0.4),
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd - 1.5,
          life: 1,
          decay: 0.03 + Math.random() * 0.03,
          radius: 1.5 + Math.random() * 2,
          color: ['#22c55e', '#4ade80', '#16a34a'][Math.floor(Math.random() * 3)],
        });
      }
    }

    function drawLanded() {
      for (const L of landed) {
        drawSpikeShape(L.x, L.topY, L.size, 'green');
        // Draw stored cracks
        if (L.cracks1 || L.cracks2) {
          const hw = L.size * 0.4;
          const sz = L.size;
          ctx.save();
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';

          function drawCrack(c) {
            const abs = c.pts.map(([rx, ry]) => [L.x + rx * hw, L.topY + ry * sz]);
            ctx.strokeStyle = '#0a0e27';
            ctx.lineWidth = c.width;
            ctx.beginPath();
            ctx.moveTo(abs[0][0], abs[0][1]);
            for (let i = 1; i < abs.length; i++) ctx.lineTo(abs[i][0], abs[i][1]);
            ctx.stroke();
          }

          if (L.cracks1) L.cracks1.forEach(drawCrack);
          if (L.cracks2) L.cracks2.forEach(drawCrack);
          ctx.restore();
        }
      }
    }

    // --- Draw Ground ---
    function drawGround() {
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(0, groundY, w, GROUND_H);
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(w, groundY);
      ctx.stroke();
    }

    // --- Update ---
    function update(now) {
      if (!gameRunning) return;

      survivalTime = (now - startTime - spikeStartDelay) / 1000;
      if (survivalTime < 0) survivalTime = 0;
      timerEl.textContent = survivalTime.toFixed(1) + 's';

      // Drink completion
      if (bob.drinking && now >= drinkEndTime) {
        bob.drinking = false;
        dialogueEl.textContent = "Bob is wired! ⚡";
      }

      // Speed/jump multipliers
      let speedMult = 1, jumpMult = 1;
      if (modifiers.tooMuch) speedMult /= TOO_MUCH_SLOW;
      if (modifiers.energyDrink && !bob.drinking) {
        speedMult *= DRINK_SPEED_MULT;
        jumpMult = DRINK_JUMP_MULT;
      }

      // Bob movement (locked while drinking)
      if (bob.drinking) {
        bob.vx = 0;
      } else if (keys['ArrowLeft'] || keys['KeyA']) {
        bob.vx = -MOVE_SPEED * speedMult;
        bob.facing = -1;
      } else if (keys['ArrowRight'] || keys['KeyD']) {
        bob.vx = MOVE_SPEED * speedMult;
        bob.facing = 1;
      } else {
        bob.vx = 0;
      }

      // Jump
      if (!bob.drinking && (keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && bob.onGround) {
        bob.vy = JUMP_FORCE * jumpMult;
        bob.onGround = false;
      }

      // Physics
      bob.x += bob.vx;
      bob.y += bob.vy;
      bob.vy += GRAVITY;

      // Platform + side collision with landed green spikes
      bob.onGround = false;
      for (const L of landed) {
        const halfW = L.size * 0.4;
        const platLeft = L.x - halfW;
        const platRight = L.x + halfW;
        const platY = L.topY;
        const bobFeetPrev = bob.y - bob.vy;
        const bobW = 10; // half-width of Bob for side collision

        // Landing on top
        if (bob.x >= platLeft && bob.x <= platRight &&
            bob.y >= platY && bobFeetPrev <= platY && bob.vy >= 0) {
          bob.y = platY;
          bob.vy = 0;
          bob.onGround = true;
        }

        // Side collision — push Bob out if he walks into a landed spike
        // Only block if Bob's feet are below the top of the spike (not jumping over)
        if (bob.y > platY && bob.y - BOB_H < groundY) {
          const bobLeft = bob.x - bobW;
          const bobRight = bob.x + bobW;
          if (bobRight > platLeft && bobLeft < platRight) {
            // Push out to nearest side
            const pushLeft = platLeft - bobRight;
            const pushRight = platRight - bobLeft;
            if (Math.abs(pushLeft) < Math.abs(pushRight)) {
              bob.x += pushLeft;
            } else {
              bob.x += pushRight;
            }
            bob.vx = 0;
          }
        }
      }

      // Ground collision
      if (bob.y >= groundY) {
        bob.y = groundY;
        bob.vy = 0;
        bob.onGround = true;
      }

      // Walls
      if (bob.x < 20) bob.x = 20;
      if (bob.x > w - 20) bob.x = w - 20;

      // Spawn spikes
      const diff = getDifficulty();
      if (now - startTime >= spikeStartDelay && now - lastSpike >= diff.spawnInterval) {
        const spikeX = 30 + Math.random() * (w - 60);
        const roll = Math.random();
        let color = 'gray';
        if (roll < 0.01) color = 'red';         // 1%
        else if (roll < 0.02) color = 'yellow'; // 1% (10% of green)
        else if (roll < 0.10) color = 'green';  // 8% green
        spikes.push({
          x: spikeX,
          y: -diff.spikeSize,
          size: diff.spikeSize,
          speed: diff.fallSpeed,
          vx: 0,
          color,
          gen: 0, // for red splits: 0 = original, 1 = first split, 2 = second split
        });
        lastSpike = now;
      }

      // Update spikes
      for (let i = spikes.length - 1; i >= 0; i--) {
        const s = spikes[i];
        s.x += (s.vx || 0);
        s.y += s.speed;
        // Apply gravity to bouncing red spikes
        if (s.color === 'red' && s.gen > 0) {
          s.speed += GRAVITY * 0.5;
        }

        // Check collision with landed green spikes (top hit or side shield)
        let hitLanded = false;
        const sHalfW = s.size * 0.4;
        const sTipY = s.y + s.size;
        const sLeft = s.x - sHalfW;
        const sRight = s.x + sHalfW;
        for (let j = landed.length - 1; j >= 0; j--) {
          const L = landed[j];
          const lHalfW = L.size * 0.4;
          const lLeft = L.x - lHalfW;
          const lRight = L.x + lHalfW;
          const lBottom = L.topY + L.size;
          // Check overlap: falling spike overlaps landed spike area
          const xOverlap = sRight > lLeft && sLeft < lRight;
          const yOverlap = sTipY >= L.topY && s.y < lBottom;
          if (xOverlap && yOverlap) {
            if (s.color === 'green') {
              // Stack on top
              landed.push({ x: s.x, topY: L.topY - s.size * 0.5, size: s.size, stack: L.stack + 1, hp: 3 });
            } else if (s.color === 'yellow') {
              // Yellow explodes on contact with landed green
              spawnShatter(s.x, s.y + s.size * 0.5, s.size, 'yellow');
              spawnExplosion(s.x, s.y + s.size * 0.5, s.size);
              sndBoom();
            } else {
              // Damage the landed green spike
              spawnShatter(s.x, s.y + s.size * 0.5, s.size, s.color);
              L.hp--;
              spawnCrackBurst(L.x, L.topY, L.size);
              if (L.hp === 2) { L.cracks1 = generateCracks(1, 2); sndTink(); }
              if (L.hp === 1) { L.cracks2 = generateCracks(2, 3); sndTink(); }
              if (L.hp <= 0) {
                spawnShatter(L.x, L.topY, L.size, 'green');
                landed.splice(j, 1);
                sndCrashBig();
              }
            }
            spikes.splice(i, 1);
            hitLanded = true;
            break;
          }
        }
        if (hitLanded) continue;

        // Hit ground
        if (s.y >= groundY) {
          if (s.color === 'green') {
            // Green spike lands half in ground
            landed.push({ x: s.x, topY: groundY - s.size * 0.5, size: s.size, stack: 1, hp: 3 });
            sndPhoom();
          } else if (s.color === 'yellow') {
            // Yellow spike explodes on ground
            spawnShatter(s.x, groundY, s.size, 'yellow');
            spawnExplosion(s.x, groundY, s.size);
            sndBoom();
          } else if (s.color === 'red' && s.gen < 2) {
            // Red spike splits into two smaller spikes that bounce sideways
            const childSize = s.size * 0.7;
            const bounceSpeed = 3 + s.gen * 1.5;
            const upSpeed = -(4 + s.gen * 2);
            spikes.push({
              x: s.x, y: groundY - childSize, size: childSize,
              speed: upSpeed, vx: -bounceSpeed, color: 'red', gen: s.gen + 1,
            });
            spikes.push({
              x: s.x, y: groundY - childSize, size: childSize,
              speed: upSpeed, vx: bounceSpeed, color: 'red', gen: s.gen + 1,
            });
            sndBling();
          } else {
            // Regular spike or final red gen: shatter
            spawnShatter(s.x, groundY, s.size, s.color);
            sndPhoom();
          }
          spikes.splice(i, 1);
          continue;
        }

        // Hit Bob — triangle vs circle checks on Bob's head and body points
        // Spike triangle vertices: top-left, top-right, bottom-tip
        const halfW = s.size * 0.4;
        const ax = s.x - halfW, ay = s.y;       // top-left
        const bx = s.x + halfW, by = s.y;       // top-right
        const cx = s.x, cy = s.y + s.size;       // bottom tip

        // Check a few points on Bob against the triangle
        const bobPoints = [
          [bob.x, bob.y - BOB_H + BOB_HEAD_R],   // head center
          [bob.x - 6, bob.y - BOB_H + BOB_HEAD_R],// head left
          [bob.x + 6, bob.y - BOB_H + BOB_HEAD_R],// head right
          [bob.x, bob.y - BOB_H * 0.5],            // torso
          [bob.x, bob.y - BOB_H * 0.35],           // hip
        ];

        let hit = false;
        for (const [px, py] of bobPoints) {
          if (pointInTriangle(px, py, ax, ay, bx, by, cx, cy)) {
            hit = true;
            break;
          }
        }
        // Also check if spike tip is inside Bob's head circle
        const headCX = bob.x, headCY = bob.y - BOB_H + BOB_HEAD_R;
        const dx = cx - headCX, dy = cy - headCY;
        if (dx * dx + dy * dy <= (BOB_HEAD_R + 2) * (BOB_HEAD_R + 2)) hit = true;

        if (hit) {
          triggerDeath(now);
          return;
        }
      }

      // Fade dialogue after spikes start
      if (now - startTime > spikeStartDelay + 2000) {
        dialogueEl.classList.add('hidden');
      }
    }

    function triggerDeath(now) {
      dead = true;
      gameRunning = false;
      bob.vx = 0;
      // If in air, mark as falling — will play death animation after landing
      if (!bob.onGround) {
        bob.falling = true;
      } else {
        bob.falling = false;
        deathTime = now;
        startDeathOverlay();
      }
      dialogueEl.textContent = "Well, better luck next time!";
      dialogueEl.classList.remove('hidden');
    }

    function startDeathOverlay() {
      setTimeout(() => {
        ovTime.textContent = `Survived: ${survivalTime.toFixed(1)}s`;
        overlay.classList.remove('hidden');
      }, 1500);
    }

    // --- Game Loop ---
    function loop() {
      ctx.clearRect(0, 0, w, h);

      const now = performance.now();
      if (gameRunning) update(now);

      // If dead and falling, keep applying gravity until landing
      if (dead && bob.falling) {
        bob.y += bob.vy;
        bob.vy += GRAVITY;
        if (bob.y >= groundY) {
          bob.y = groundY;
          bob.vy = 0;
          bob.falling = false;
          bob.onGround = true;
          deathTime = performance.now();
          startDeathOverlay();
        }
      }

      // Draw falling spikes and landed spikes behind ground
      for (const s of spikes) drawSpike(s);
      drawLanded();

      // Draw ground on top
      drawGround();

      // Draw Bob on top
      drawBob();

      // Explosions
      updateExplosions();
      drawExplosions();

      // Particles
      updateParticles();
      drawParticles();

      requestAnimationFrame(loop);
    }

    // --- Input ---
    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space' || e.code === 'ArrowUp') e.preventDefault();
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    ovBtn.addEventListener('click', () => {
      init();
    });

    // --- Menu ---
    const menuEl = document.getElementById('menu');
    const startBtn = document.getElementById('start-btn');
    const EXCLUSIVE_MODS = ['tooMuch', 'energyDrink'];
    document.querySelectorAll('.mod-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const mod = btn.dataset.mod;
        const wasSelected = btn.classList.contains('selected');
        if (EXCLUSIVE_MODS.includes(mod) && !wasSelected) {
          document.querySelectorAll('.mod-btn').forEach(other => {
            if (other !== btn && EXCLUSIVE_MODS.includes(other.dataset.mod)) {
              other.classList.remove('selected');
            }
          });
        }
        btn.classList.toggle('selected');
      });
    });
    startBtn.addEventListener('click', () => {
      ensureAudio();
      modifiers.tooMuch = document.querySelector('[data-mod="tooMuch"]').classList.contains('selected');
      modifiers.energyDrink = document.querySelector('[data-mod="energyDrink"]').classList.contains('selected');
      modifiers.ragingSpikes = document.querySelector('[data-mod="ragingSpikes"]').classList.contains('selected');
      menuEl.classList.add('hidden');
      init();
      loop();
    });
  </script>
</body>
</html>
